<head>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
:root {
  --bg:#1a1d23;--bg-card:#252932;--bg-deep:#14171c;--bg-soft:#2d3138;
  --ink:#f5f5f7;--ink-soft:#e0e0e3;--ink-muted:#a8acb3;--ink-faint:#7a7e85;
  --gold:#c9a063;--gold-bright:#e6b970;
  --positive:#4caf6f;--warning:#e8a256;--negative:#e57373;--info:#5a9fc4;
  --rule:rgba(255,255,255,0.10);--rule-strong:rgba(255,255,255,0.20);
  --serif:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;
  --sans:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;
  --mono:'JetBrains Mono','Pretendard Variable',Consolas,monospace;
  --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.masthead{background:var(--bg-deep);border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200;}
.masthead-inner{max-width:1640px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo-mark{font-family:var(--serif);font-weight:800;font-size:18px;color:var(--gold-bright);white-space:nowrap;}
.team-tag{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.5);border-left:1px solid rgba(255,255,255,0.2);padding-left:14px;margin-left:14px;white-space:nowrap;}
.page-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(201,160,99,0.15);border:1px solid rgba(201,160,99,0.35);border-radius:3px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold-bright);letter-spacing:0.12em;}
.masthead-right{display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.6);}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--positive);margin-right:5px;animation:pulse 2.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.app-shell{display:flex;min-height:calc(100vh - 52px);}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-deep);border-right:1px solid var(--rule);padding:20px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.filter-section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:8px;text-transform:uppercase;}
.otb-nav{display:flex;flex-direction:column;gap:2px;}
.otb-nav-link{display:block;padding:6px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--ink-muted);text-decoration:none;transition:all 0.15s;letter-spacing:0.03em;white-space:nowrap;}
.otb-nav-link:hover{background:var(--bg-soft);color:var(--ink);}
.otb-nav-link.active{background:rgba(201,160,99,0.18);color:var(--gold-bright);}
.main-content{flex:1;min-width:0;padding:24px 28px;}
.mobile-sheet-tabs{display:none;background:var(--bg-deep);border-bottom:1px solid var(--rule);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;position:sticky;top:52px;z-index:100;padding:0 4px;}
.mobile-sheet-tabs::-webkit-scrollbar{display:none;}
@media(max-width:860px){:root{--sidebar-w:0px;}.sidebar{display:none;}.mobile-sheet-tabs{display:flex;}}
.mobile-sheet-tab{flex-shrink:0;padding:9px 14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-muted);text-decoration:none;white-space:nowrap;letter-spacing:0.06em;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;}
.mobile-sheet-tab:hover{color:var(--ink);}
.mobile-sheet-tab.active{color:var(--gold-bright);border-bottom-color:var(--gold);background:rgba(201,160,99,0.08);}
</style>
<style>
.gsn{background:#0b0f14;border-bottom:1px solid #1e2530;font-family:'Noto Sans KR',-apple-system,sans-serif;font-size:13px;position:relative;z-index:200}
.gsn-wrap{max-width:1400px;margin:0 auto;padding:0 20px;height:42px;display:flex;align-items:center}
.gsn-brand{color:#7a8794;text-decoration:none;font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap;margin-right:24px;padding-right:24px;border-right:1px solid #1e2530}
.gsn-brand:hover{color:#c9d1d9}
.gsn-brand-dot{color:#58a6ff}
.gsn-links{display:flex;align-items:center;gap:2px;flex:1}
.gsn-item{color:#7d8590;text-decoration:none;padding:4px 12px;border-radius:6px;white-space:nowrap;font-size:13px;transition:background .15s,color .15s;display:flex;align-items:center;gap:6px}
.gsn-item:hover{background:#1a2232;color:#c9d1d9}
.gsn-item.active{background:#1c2d3f;color:#58a6ff;font-weight:600}
.gsn-soon{pointer-events:none;opacity:.4}
.gsn-badge{background:#2d3a48;color:#7d8590;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:.3px}
.gsn-toggle{display:none;background:none;border:none;color:#7d8590;cursor:pointer;padding:5px;border-radius:4px;margin-left:auto}
.gsn-toggle:hover{color:#c9d1d9;background:#1e2530}
@media(max-width:640px){
  .gsn-links{display:none;flex-direction:column;position:absolute;top:42px;left:0;right:0;background:#0b0f14;border-bottom:1px solid #1e2530;padding:8px 12px;gap:3px;z-index:300}
  .gsn-links.open{display:flex}
  .gsn-item{padding:8px 12px}
  .gsn-toggle{display:flex;align-items:center;justify-content:center}
}
</style>
</head>

    <div class="gsn-links" id="gsn-links">

    </button>
  </div>
</nav>
<script>(function(){var h=location.href;document.querySelectorAll('.gsn-item[data-gsn]').forEach(function(a){var k=a.getAttribute('data-gsn');if(k==='otb'&&h.indexOf('gs_daily_trend_news_public_temp')!==-1&&h.indexOf('index.html')===-1&&!h.match(/gs_daily_trend_news_public_temp\/?$/)){a.classList.add('active');}else if(k==='trend'&&(h.indexOf('gs_daily_trend_news_public_temp')!==-1&&(h.indexOf('index.html')!==-1||h.match(/gs_daily_trend_news_public_temp\/?$/)))){a.classList.add('active');}else if(k==='monitor'&&h.indexOf('sono-competitor-crawler')!==-1&&h.indexOf('palatium')===-1){a.classList.add('active');}else if(k==='palatium'&&h.indexOf('palatium')!==-1){a.classList.add('active');}});}());</script>
<header class="masthead">

      <a href="otb.html" style="margin-top:8px;padding:8px 20px;background:rgba(201,160,99,0.15);border:1px solid rgba(201,160,99,0.35);border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--gold-bright);text-decoration:none;">← 당일현황으로 돌아가기</a>
