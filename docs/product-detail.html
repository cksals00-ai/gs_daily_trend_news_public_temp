<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#1a1d23;--bg-card:#252932;--bg-deep:#14171c;--bg-soft:#2d3138;--ink:#f5f5f7;--ink-soft:#e0e0e3;--ink-muted:#a8acb3;--ink-faint:#7a7e85;--gold:#c9a063;--gold-bright:#e6b970;--positive:#4caf6f;--warning:#e8a256;--negative:#e57373;--info:#5a9fc4;--rule:rgba(255,255,255,0.10);--rule-strong:rgba(255,255,255,0.20);--sans:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;--mono:'JetBrains Mono','Pretendard Variable',Consolas,monospace;--sidebar-w:220px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.masthead{background:var(--bg-deep);border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200;}
.masthead-inner{max-width:1640px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo-mark{font-family:var(--sans);font-weight:800;font-size:18px;color:var(--gold-bright);white-space:nowrap;}
.team-tag{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.5);border-left:1px solid rgba(255,255,255,0.2);padding-left:14px;margin-left:14px;white-space:nowrap;}
.page-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(201,160,99,0.15);border:1px solid rgba(201,160,99,0.35);border-radius:3px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold-bright);letter-spacing:0.12em;}
.masthead-right{display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.6);}
.app-shell{display:flex;min-height:calc(100vh - 52px);}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-deep);border-right:1px solid var(--rule);padding:20px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.sb-label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:8px;text-transform:uppercase;}
.otb-nav{display:flex;flex-direction:column;gap:2px;}
.otb-nav-link{display:block;padding:6px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--ink-muted);text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.otb-nav-link:hover{background:var(--bg-soft);color:var(--ink);}
.otb-nav-link.active{background:rgba(201,160,99,0.18);color:var(--gold-bright);}
.chip-group{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:4px 8px;border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--ink-muted);border:1px solid var(--rule);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.chip:hover{border-color:var(--gold);color:var(--gold-bright);}
.chip.active{background:rgba(201,160,99,0.20);border-color:var(--gold);color:var(--gold-bright);font-weight:700;}
.main-content{flex:1;min-width:0;padding:24px 28px;display:flex;flex-direction:column;gap:20px;}
.mobile-sheet-tabs{display:none;background:var(--bg-deep);border-bottom:1px solid var(--rule);overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:100;padding:0 4px;}
@media(max-width:860px){:root{--sidebar-w:0px;}.sidebar{display:none;}.mobile-sheet-tabs{display:flex;}}
.mobile-sheet-tab{flex-shrink:0;padding:9px 14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-muted);text-decoration:none;white-space:nowrap;letter-spacing:0.06em;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;}
.mobile-sheet-tab.active{color:var(--gold-bright);border-bottom-color:var(--gold);background:rgba(201,160,99,0.08);}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.kpi-card{background:var(--bg-card);border:1px solid var(--rule);border-radius:6px;padding:16px;}
.kpi-label{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--ink-faint);margin-bottom:6px;}
.kpi-value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink);}
.kpi-sub{font-family:var(--mono);font-size:11px;color:var(--ink-muted);margin-top:4px;}
.badge-pos{color:var(--positive);} .badge-neg{color:var(--negative);}
/* section card */
.card{background:var(--bg-card);border:1px solid var(--rule);border-radius:6px;padding:18px;}
.card-title{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--ink-muted);margin-bottom:14px;text-transform:uppercase;}
/* tables */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--ink-faint);text-align:left;padding:6px 8px;border-bottom:1px solid var(--rule);white-space:nowrap;}
.data-table th.r,.data-table td.r{text-align:right;}
.data-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:top;}
.data-table tr:hover td{background:rgba(255,255,255,0.03);}
.cat-row{cursor:pointer;}
.cat-row.selected td{background:rgba(201,160,99,0.10);}
.rank-no{font-family:var(--mono);font-size:11px;color:var(--ink-faint);width:28px;}
.series-name{font-size:12px;color:var(--ink-soft);}
/* two-col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}
.chart-wrap{position:relative;height:320px;}
/* gsn */
.gsn{background:#0b0f14;border-bottom:1px solid #1e2530;font-family:'Noto Sans KR',-apple-system,sans-serif;font-size:13px;position:relative;z-index:200}
.gsn-wrap{max-width:1400px;margin:0 auto;padding:0 20px;height:42px;display:flex;align-items:center}
.gsn-brand{color:#7a8794;text-decoration:none;font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap;margin-right:24px;padding-right:24px;border-right:1px solid #1e2530}
.gsn-brand:hover{color:#c9d1d9}
.gsn-brand-dot{color:#58a6ff}
.gsn-links{display:flex;align-items:center;gap:2px;flex:1}
.gsn-item{color:#7d8590;text-decoration:none;padding:4px 12px;border-radius:6px;white-space:nowrap;font-size:13px;transition:background .15s,color .15s;}
.gsn-item:hover{background:#1a2232;color:#c9d1d9}
.gsn-item.active{background:#1c2d3f;color:#58a6ff;font-weight:600}
</style>
</head>

<header class="masthead">
  <div class="masthead-inner">
    <div style="display:flex;align-items:baseline;gap:0;">
      <div class="logo-mark">SONO &amp; TRINITY</div>
      <div class="team-tag">GS팀 · GS 실적 리포트</div>
    </div>

<div class="app-shell">
  <aside class="sidebar">
    <div>
      <div class="sb-label">GS 실적 리포트</div>
      <div class="otb-nav">
        <a href="otb.html" class="otb-nav-link">당일현황</a>
        <a href="channel.html" class="otb-nav-link">채널별</a>
        <a href="ytd.html" class="otb-nav-link">연간누계</a>
        <a href="monthly.html" class="otb-nav-link">월별실적</a>
        <a href="stay-date.html" class="otb-nav-link">투숙일기준</a>
        <a href="booking-trend.html" class="otb-nav-link">예약추이</a>
        <a href="ly-trend.html" class="otb-nav-link">전년추이</a>

    </div>
    <div>

    <div>
      <div class="sb-label">카테고리</div>
      <div class="chip-group" id="cat-chips"></div>
    </div>
  </aside>
  <main class="main-content">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="card">
      <div class="card-title">카테고리별 실적 요약</div>
      <table class="data-table">
        <thead><tr>
          <th>카테고리</th>
          <th class="r">RN</th><th class="r">비중</th>
          <th class="r">매출(백만)</th>
          <th class="r">ADR(천원)</th>
          <th class="r">상품수</th>
        </tr></thead>
        <tbody id="cat-tbody"></tbody>
      </table>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title" id="chart-title">Top 10 상품 (RN)</div>
        <div class="chart-wrap"><canvas id="prod-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title" id="series-title">상품 랭킹</div>
        <table class="data-table">
          <thead><tr>
            <th>#</th><th>상품명</th>
            <th class="r">RN</th><th class="r">매출</th><th class="r">ADR</th>
          </tr></thead>
          <tbody id="series-tbody"></tbody>
        </table>
      </div>
    </div>

</div>
<script>
const DATA_URL = 'data/package_series_trend.json';
const CAT_ORDER = [
  '전체','룸온니_프로모션','룸온니_OTA거래처','연박/투나잇','올인클루시브',
  '조식패키지','세일/기획전','워터풀/오션','동계/윈터','썸머패키지',
  '스프링/가을','액티비티/레저','브랜드/멤버스데이','기타'
];
const YEAR_COLORS = {'2022':'#9e9e9e','2023':'#6ba3c4','2024':'#e6b970','2025':'#d97a7a','2026':'#6db58a'};
let pkg, selYear, selCat='전체', chart;

function fmt(n){if(n>=10000)return (n/10000).toFixed(1)+'만';return n.toLocaleString();}
function fmtR(n){return n>=0?'+'+n.toFixed(1)+'%':n.toFixed(1)+'%';}
function yoyClass(n){return n>=0?'badge-pos':'badge-neg';}

function sumCat(cat, year){
  if(!pkg.by_category[cat]) return {rn:0,rev:0};
  const yrData = pkg.by_category[cat][year]||{};
  let rn=0,rev=0;
  for(const m of Object.values(yrData)){rn+=m.rn;rev+=m.rev;}
  return {rn,rev,adr:rn>0?Math.round(rev*1000/rn):0};
}

function sumAllCat(year){
  let rn=0,rev=0;
  for(const cat of Object.keys(pkg.by_category)){
    const s=sumCat(cat,year);rn+=s.rn;rev+=s.rev;
  }
  return {rn,rev,adr:rn>0?Math.round(rev*1000/rn):0};
}

function filteredRanking(){
  const ranking = pkg.by_year_ranking[selYear]||[];
  if(selCat==='전체') return ranking;
  return ranking.filter(x=>x.category===selCat);
}

function renderKPI(){
  const years = pkg.meta.years;
  const prevYear = String(parseInt(selYear)-1);
  const cy = selCat==='전체'?sumAllCat(selYear):sumCat(selCat,selYear);
  const py = selCat==='전체'?sumAllCat(prevYear):sumCat(selCat,prevYear);
  const yoyRn = py.rn>0?((cy.rn-py.rn)/py.rn*100):null;
  const yoyRev = py.rev>0?((cy.rev-py.rev)/py.rev*100):null;
  const cats = pkg.by_category;
  const seriesCount = filteredRanking().length;
  const catCount = selCat==='전체'?Object.keys(cats).length:1;
  document.getElementById('kpi-row').innerHTML = \`
    <div class="kpi-card"><div class="kpi-label">객실수 (RN)</div>
      <div class="kpi-value">\${cy.rn.toLocaleString()}</div>
      <div class="kpi-sub">\${yoyRn!==null?\`<span class="\${yoyClass(yoyRn)}">\${fmtR(yoyRn)}</span> vs \${prevYear}년\`:'—'}</div></div>
    <div class="kpi-card"><div class="kpi-label">매출 (백만원)</div>
      <div class="kpi-value">\${cy.rev.toLocaleString()}</div>
      <div class="kpi-sub">\${yoyRev!==null?\`<span class="\${yoyClass(yoyRev)}">\${fmtR(yoyRev)}</span> vs \${prevYear}년\`:'—'}</div></div>
    <div class="kpi-card"><div class="kpi-label">ADR (천원)</div>
      <div class="kpi-value">\${cy.adr.toLocaleString()}</div><div class="kpi-sub">&nbsp;</div></div>
    <div class="kpi-card"><div class="kpi-label">카테고리 / 상품수</div>
      <div class="kpi-value">\${catCount} / \${seriesCount}</div><div class="kpi-sub">&nbsp;</div></div>
  \`;
}

function renderCatTable(){
  const totalRn = Object.keys(pkg.by_category).reduce((s,c)=>s+sumCat(c,selYear).rn,0)||1;
  const seriesPerCat = {};
  for(const x of (pkg.by_year_ranking[selYear]||[])){
    seriesPerCat[x.category]=(seriesPerCat[x.category]||0)+1;
  }
  const rows = CAT_ORDER.filter(c=>c!=='전체').map(cat=>{
    const s=sumCat(cat,selYear);
    const pct=(s.rn/totalRn*100).toFixed(1);
    const sc=seriesPerCat[cat]||0;
    const sel=selCat===cat;
    return \`<tr class="cat-row\${sel?' selected':''}" onclick="window._pd_selCat('\${cat}')">
      <td>\${cat}</td>
      <td class="r">\${s.rn.toLocaleString()}</td>
      <td class="r">\${pct}%</td>
      <td class="r">\${s.rev.toLocaleString()}</td>
      <td class="r">\${s.adr.toLocaleString()}</td>
      <td class="r">\${sc}</td>
    </tr>\`;
  }).join('');
  document.getElementById('cat-tbody').innerHTML=rows;
}

function renderChart(){
  const ranking = filteredRanking().slice(0,10).reverse();
  const labels = ranking.map(x=>x.name.length>20?x.name.slice(0,20)+'…':x.name);
  const data = ranking.map(x=>x.rn);
  if(chart){chart.destroy();}
  const ctx=document.getElementById('prod-chart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'rgba(201,160,99,0.7)',borderRadius:3,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw.toLocaleString()+' RN'}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#a8acb3',font:{size:10}}},
              y:{grid:{display:false},ticks:{color:'#f5f5f7',font:{size:11}}}}}
  });
  document.getElementById('chart-title').textContent=(selCat==='전체'?'전체':selCat)+' Top 10 (RN) — '+selYear;
}

function renderSeriesTable(){
  const ranking = filteredRanking();
  document.getElementById('series-title').textContent=(selCat==='전체'?'전체':selCat)+' 상품 랭킹 — '+selYear;
  document.getElementById('series-tbody').innerHTML=ranking.slice(0,30).map((x,i)=>\`
    <tr><td class="rank-no">\${i+1}</td>
    <td class="series-name">\${x.name}</td>
    <td class="r" style="font-family:var(--mono);font-size:12px">\${x.rn.toLocaleString()}</td>
    <td class="r" style="font-family:var(--mono);font-size:12px">\${x.rev.toLocaleString()}</td>
    <td class="r" style="font-family:var(--mono);font-size:12px">\${x.adr.toLocaleString()}</td>
    </tr>\`).join('');
}

function render(){renderKPI();renderCatTable();renderChart();renderSeriesTable();}

function buildFilters(){
  const years=[...pkg.meta.years].reverse();
  selYear=years[0];
  document.getElementById('year-chips').innerHTML=years.map(y=>\`<div class="chip\${y===selYear?' active':''}" onclick="selYear='\${y}';document.querySelectorAll('#year-chips .chip').forEach(c=>c.classList.toggle('active',c.textContent==='\${y}'));render()">\${y}</div>\`).join('');
  document.getElementById('cat-chips').innerHTML=CAT_ORDER.map(c=>\`<div class="chip\${c==='전체'?' active':''}" onclick="window._pd_selCat('\${c}')">\${c}</div>\`).join('');
}

window._pd_selCat=function(cat){
  selCat=cat;
  document.querySelectorAll('#cat-chips .chip').forEach(c=>c.classList.toggle('active',c.textContent===cat));
  render();
};

fetch(DATA_URL).then(r=>r.json()).then(d=>{
  pkg=d;
  buildFilters();
  render();
}).catch(e=>{document.querySelector('.main-content').innerHTML='<div style="padding:40px;color:var(--negative);font-family:var(--mono);">데이터 로드 실패: '+e+'</div>';});
</script>
