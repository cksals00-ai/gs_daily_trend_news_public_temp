<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>품의 작성용 · SONO GS팀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#1a1d23;--bg-card:#252932;--bg-deep:#14171c;--bg-soft:#2d3138;
  --ink:#f5f5f7;--ink-soft:#e0e0e3;--ink-muted:#a8acb3;--ink-faint:#7a7e85;
  --gold:#c9a063;--gold-bright:#e6b970;
  --positive:#4caf6f;--positive-bg:#1f3a28;--warning:#e8a256;--warning-bg:#3d2e1a;
  --negative:#e57373;--negative-bg:#3d1f1f;--info:#5a9fc4;--info-bg:#1a2e3d;
  --rule:rgba(255,255,255,0.10);--rule-strong:rgba(255,255,255,0.20);
  --serif:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;
  --sans:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;
  --mono:'JetBrains Mono','Pretendard Variable',Consolas,monospace;
  --sidebar-w:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;font-weight:500;line-height:1.55;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;overflow-x:hidden;word-break:keep-all;}
input,button,select,table,th,td{font-family:var(--sans)!important;}

.masthead{background:var(--bg-deep);border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200;}
.masthead-inner{max-width:1640px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo-mark{font-family:var(--serif);font-weight:800;font-size:18px;color:var(--gold-bright);white-space:nowrap;text-decoration:none;}
.team-tag{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.5);border-left:1px solid rgba(255,255,255,0.2);padding-left:14px;margin-left:14px;white-space:nowrap;}
.page-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(201,160,99,0.15);border:1px solid rgba(201,160,99,0.35);border-radius:3px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold-bright);letter-spacing:0.12em;}
.masthead-right{display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.6);}

.app-shell{display:flex;min-height:calc(100vh - 52px);}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-deep);border-right:1px solid var(--rule);padding:20px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.filter-section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:8px;text-transform:uppercase;}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:4px 10px;border-radius:3px;border:1px solid var(--rule-strong);background:transparent;color:var(--ink-muted);font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em;user-select:none;}
.chip:hover{background:var(--bg-soft);color:var(--ink);}
.chip.active{background:rgba(201,160,99,0.18);border-color:var(--gold);color:var(--gold-bright);}
.sidebar-divider{height:1px;background:var(--rule);}

.prop-list{display:flex;flex-direction:column;gap:3px;max-height:calc(100vh - 420px);overflow-y:auto;}
.prop-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--ink-muted);transition:all 0.15s;}
.prop-item:hover{background:var(--bg-soft);color:var(--ink);}
.prop-item.active{background:rgba(201,160,99,0.12);color:var(--gold-bright);}
.prop-item input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer;}
.prop-item label{cursor:pointer;flex:1;}

.main-content{flex:1;min-width:0;padding:24px 28px;display:flex;flex-direction:column;gap:20px;}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.page-title{font-family:var(--serif);font-weight:800;font-size:clamp(20px,2.2vw,26px);color:var(--ink);letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;}
.page-title .sub{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink-faint);letter-spacing:0.08em;}

.btn-action{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(201,160,99,0.18);border:1px solid var(--gold);border-radius:4px;color:var(--gold-bright);font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.06em;}
.btn-action:hover{background:rgba(201,160,99,0.3);}
.btn-action:disabled{opacity:0.4;cursor:not-allowed;}

.btn-gen{background:var(--positive);border-color:var(--positive);color:#fff;font-size:13px;padding:10px 24px;}
.btn-gen:hover{background:#5cc080;}

.forecast-table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--bg-card);}
.forecast-table th,.forecast-table td{padding:8px 14px;border:1px solid var(--rule-strong);text-align:right;font-family:var(--mono);font-size:12px;}
.forecast-table th{background:var(--bg-deep);color:var(--ink-muted);font-weight:700;letter-spacing:0.06em;text-align:center;white-space:nowrap;}
.forecast-table td{color:var(--ink-soft);}
.forecast-table .row-label{text-align:left;font-weight:600;color:var(--ink-muted);white-space:nowrap;}
.forecast-table .section-header{background:var(--bg-deep);color:var(--gold-bright);font-weight:800;text-align:left;font-size:12.5px;letter-spacing:0.05em;border-bottom:2px solid var(--gold);}
.forecast-table .section-header td{padding:10px 14px;}
.forecast-table .pct-cell{color:var(--ink-faint);}
.forecast-table .pos{color:var(--positive);}
.forecast-table .neg{color:var(--negative);}

.table-block{background:var(--bg-card);border:1px solid var(--rule);border-radius:6px;overflow:hidden;margin-bottom:16px;}
.table-block-header{padding:14px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
.table-block-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gold-bright);letter-spacing:0.06em;}
.table-block-sub{font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

.empty-state{text-align:center;padding:80px 20px;color:var(--ink-faint);font-family:var(--mono);font-size:13px;letter-spacing:0.04em;}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.3;}

/* ─── 기획전 입력 폼 ─── */
.pumui-form{background:var(--bg-card);border:1px solid var(--rule);border-radius:6px;overflow:hidden;margin-top:8px;}
.pumui-form-header{padding:14px 20px;border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;}
.pumui-form-title{font-family:var(--mono);font-size:13px;font-weight:800;color:var(--gold-bright);letter-spacing:0.06em;}
.pumui-form-body{padding:20px;}

.form-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.form-table th,.form-table td{padding:8px 12px;border:1px solid var(--rule-strong);vertical-align:top;}
.form-table th{background:var(--bg-deep);color:var(--ink-muted);font-weight:700;text-align:left;white-space:nowrap;width:100px;font-family:var(--mono);font-size:11px;letter-spacing:0.04em;}
.form-table td{color:var(--ink-soft);}
.form-table input[type=text],.form-table input[type=number],.form-table input[type=date],.form-table textarea,.form-table select{
  background:var(--bg-soft);border:1px solid var(--rule);border-radius:3px;color:var(--ink);padding:5px 8px;font-family:var(--mono);font-size:11.5px;width:100%;outline:none;transition:border-color 0.15s;
}
.form-table input:focus,.form-table textarea:focus,.form-table select:focus{border-color:var(--gold);}
.form-table textarea{min-height:60px;resize:vertical;}

.sub-table{width:100%;border-collapse:collapse;font-size:11.5px;margin:4px 0;}
.sub-table th,.sub-table td{padding:5px 8px;border:1px solid var(--rule);text-align:center;}
.sub-table th{background:var(--bg-deep);color:var(--ink-faint);font-weight:600;font-size:10.5px;}
.sub-table input{width:80px;text-align:right;}

.form-actions{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--rule);justify-content:flex-end;}
.btn-submit{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--positive);border:1px solid var(--positive);border-radius:4px;color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.06em;}
.btn-submit:hover{background:#5cc080;}
.btn-submit:disabled{opacity:0.4;cursor:not-allowed;}
.btn-reset{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:transparent;border:1px solid var(--rule-strong);border-radius:4px;color:var(--ink-muted);font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;}
.btn-reset:hover{border-color:var(--negative);color:var(--negative);}

.form-msg{padding:8px 14px;border-radius:4px;font-family:var(--mono);font-size:11.5px;margin:8px 20px;display:none;}
.form-msg.success{display:block;background:var(--positive-bg);color:var(--positive);border:1px solid var(--positive);}
.form-msg.error{display:block;background:var(--negative-bg);color:var(--negative);border:1px solid var(--negative);}

.add-row-btn{background:transparent;border:1px dashed var(--rule-strong);border-radius:4px;color:var(--ink-faint);font-family:var(--mono);font-size:11px;padding:6px 14px;cursor:pointer;width:100%;margin-top:8px;}
.add-row-btn:hover{border-color:var(--gold);color:var(--gold);}

.seg-select{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.seg-chip{padding:3px 8px;border-radius:3px;border:1px solid var(--rule);background:transparent;color:var(--ink-faint);font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.12s;}
.seg-chip:hover{color:var(--ink);}
.seg-chip.active{background:rgba(90,159,196,0.18);border-color:var(--info);color:var(--info);}

.select-all-btn{font-family:var(--mono);font-size:10px;color:var(--ink-faint);cursor:pointer;padding:2px 6px;border:1px solid var(--rule);border-radius:3px;background:transparent;margin-left:auto;}
.select-all-btn:hover{color:var(--ink);background:var(--bg-soft);}

@media(max-width:900px){
  .app-shell{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;padding:12px;}
  .prop-list{max-height:200px;flex-direction:row;flex-wrap:wrap;}
  .main-content{padding:16px;}
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div style="display:flex;align-items:center;">
      <a href="index.html" class="logo-mark">SONO</a>
      <span class="team-tag">GS팀</span>
    </div>
    <div class="masthead-right">
      <span class="page-badge">품의 작성</span>
      <span id="today-date"></span>
    </div>
  </div>
</header>

<div class="app-shell">
  <aside class="sidebar">
    <div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <span class="filter-section-label" style="margin-bottom:0;">사업장</span>
        <button class="select-all-btn" id="btn-prop-all">전체선택</button>
      </div>
      <div class="prop-list" id="prop-list"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <span class="filter-section-label" style="margin-bottom:0;">월 선택</span>
        <button class="select-all-btn" id="btn-month-all">전체선택</button>
      </div>
      <div class="filter-chips" id="month-chips"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div>
      <div class="filter-section-label">GS 세그먼트</div>
      <div class="seg-select" id="seg-chips"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-action btn-gen" id="btn-generate" onclick="generateTables()">테이블 생성</button>
      <button class="btn-action" id="btn-download" onclick="downloadExcel()" disabled>엑셀 다운로드</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">품의서 작성<span class="sub">사업장/월 선택 후 생성</span></div>
    </div>
    <div id="output-area">
      <div class="empty-state">
        <div class="icon">📋</div>
        좌측에서 사업장과 월을 선택하고<br>
        [테이블 생성] 버튼을 눌러주세요
      </div>
    </div>

    <!-- ─── 기획전 상세 입력 ─── -->
    <div class="pumui-form" id="pumui-form">
      <div class="pumui-form-header">
        <span class="pumui-form-title">3. 내 용 — 기획전 상세</span>
        <button class="select-all-btn" onclick="resetForm()" style="font-size:11px;">초기화</button>
      </div>
      <div class="pumui-form-body">
        <table class="form-table">
          <tr><th>사업장</th><td><input type="text" id="f-property" placeholder="예: 소노캄 거제"></td></tr>
          <tr><th>채 널</th><td><input type="text" id="f-channel" placeholder="예: 회원 / 인플루언서"></td></tr>
          <tr><th>판매일자</th><td>
            <div style="display:flex;gap:8px;align-items:center;">
              <input type="text" id="f-sale-period" placeholder="예: 1차: 5/12~5/14, 2차: 5/26~5/29" style="flex:1;">
            </div>
          </td></tr>
          <tr><th>투숙일자</th><td><input type="text" id="f-stay-period" placeholder="예: 5월 12일 ~ 7월 16일"></td></tr>
          <tr><th>상 품</th><td>
            <textarea id="f-product" placeholder="패키지 구성 입력&#10;예:&#10;① Ocean pkg - 객실+조식+오션or요트투어+레전드히어로즈+할인권&#10;② Morning pkg - 객실+조식+오션or요트투어+레전드히어로즈+할인권"></textarea>
          </td></tr>
          <tr><th>상품 비고</th><td><input type="text" id="f-product-note" placeholder="예: 기준인원(3,4인), 셀러특전 등"></td></tr>
        </table>

        <!-- 요금안 (엑셀 업로드 시 동적 생성) -->
        <div id="pricing-section" style="display:none;"></div>
      </div>

      <div class="form-msg" id="form-msg"></div>
      <div class="form-actions">
        <input type="file" id="xlsx-upload" accept=".xlsx,.xls" style="display:none" onchange="handleXlsxUpload(event)">
        <button class="btn-action" onclick="document.getElementById('xlsx-upload').click()">요금안 엑셀 업로드</button>
        <button class="btn-action" onclick="addToExcelDownload()" style="opacity:0.7;">품의서 다운로드</button>
        <button class="btn-submit" id="btn-submit-sheet" onclick="submitToSheet()" style="display:none;">구글시트 제출</button>
      </div>
      <div id="xlsx-preview" style="margin-top:16px;"></div>
    </div>

    <!-- Apps Script 설정 (숨김) -->
    <div style="display:none;margin-top:12px;padding:12px 16px;background:var(--bg-soft);border:1px solid var(--rule);border-radius:6px;" id="apps-script-config">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--ink-faint);">APPS SCRIPT 연동</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="apps-script-url" placeholder="Apps Script 웹앱 URL 입력" style="flex:1;background:var(--bg-card);border:1px solid var(--rule);border-radius:3px;color:var(--ink);padding:6px 10px;font-family:var(--mono);font-size:11px;outline:none;">
        <button class="select-all-btn" onclick="saveScriptUrl()" style="padding:5px 12px;">저장</button>
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:6px;">구글시트 제출을 사용하려면 Apps Script 웹앱 URL을 입력하세요</div>
    </div>
  </main>
</div>

<script>
/* ─── Property name mapping ─── */
const PROPERTIES = [
  {id:'01',otb:'01.벨비발디',db:'소노벨 비발디파크',occ:'01.벨비발디',label:'소노벨 비발디파크'},
  {id:'02',otb:'02.캄비발디',db:'소노캄 비발디파크',occ:'02.캄비발디',label:'소노캄 비발디파크'},
  {id:'03',otb:'03.펫비발디',db:'소노펫 비발디파크',occ:'03.펫비발디',label:'소노펫 비발디파크'},
  {id:'04',otb:'04.펠리체비발디',db:'소노펠리체 비발디파크',occ:'04.펠리체비발디',label:'소노펠리체 비발디파크'},
  {id:'05',otb:'05.빌리지비발디',db:'소노펠리체 빌리지 비발디파크',daily:'소노펠리체빌리지 비발디파크',occ:'05.빌리지비발디',label:'빌리지 비발디파크'},
  {id:'06',otb:'06.양평',db:'소노휴 양평',daily:'소노벨 양평',occ:'06.양평',label:'소노휴 양평'},
  {id:'07',otb:'07.델피노',db:'델피노',occ:'07.델피노',label:'델피노'},
  {id:'08',otb:'08.쏠비치양양',db:'쏠비치 양양',occ:'08.양양',label:'쏠비치 양양'},
  {id:'09',otb:'09.쏠비치삼척',db:'쏠비치 삼척',occ:'09.삼척',label:'쏠비치 삼척'},
  {id:'10',otb:'10.소노벨단양',db:'소노문 단양',daily:'소노벨 단양',occ:'10.단양',label:'소노벨 단양'},
  {id:'11',otb:'11.소노캄경주',db:'소노벨 경주',daily:'소노캄 경주',occ:'11.경주',label:'소노캄 경주'},
  {id:'12',otb:'12.소노벨청송',db:'소노벨 청송',occ:'12.청송',label:'소노벨 청송'},
  {id:'13',otb:'13.소노벨천안',db:'소노벨 천안',occ:'13.천안',label:'소노벨 천안'},
  {id:'14',otb:'14.소노벨변산',db:'소노벨 변산',occ:'14.변산',label:'소노벨 변산'},
  {id:'15',otb:'15.소노캄여수',db:'소노캄 여수',occ:'15.여수',label:'소노캄 여수'},
  {id:'16',otb:'16.소노캄거제',db:'소노캄 거제',occ:'16.거제',label:'소노캄 거제'},
  {id:'17',otb:'17.쏠비치진도',db:'쏠비치 진도',occ:'17.진도',label:'쏠비치 진도'},
  {id:'18',otb:'18.소노벨제주',db:'소노벨 제주',occ:'18.제주벨',label:'소노벨 제주'},
  {id:'19',otb:'19.소노캄제주',db:'소노캄 제주',occ:'19.제주캄',label:'소노캄 제주'},
  {id:'20',otb:'20.소노캄고양',db:'소노캄 고양',occ:'20.고양',label:'소노캄 고양'},
  {id:'21',otb:'21.소노문해운대',db:'소노문 해운대',occ:'21.소노문',label:'소노문 해운대'},
  {id:'22',otb:'22.쏠비치남해',db:'쏠비치 남해',occ:'22.남해',label:'쏠비치 남해'},
  {id:'23',otb:'23.르네블루',db:'르네블루',occ:'23.르네블루',label:'르네블루'}
];

const GS_SEGMENTS = ['OTA','G-OTA','Inbound'];
const ALL_SEGMENTS = ['OTA','G-OTA','Inbound','D멤버스','FIT','GSA','H/U','네트웍스 일반단체','단체COMP','법인주중(회원사)','비회원COMP','연간계약사','인바운드COMP','일반단체','임차','자사 패키지','제휴사PKG','학생단체','할인권 예약부일반','회원PKG'];
const AVAIL_MONTHS = [4,5,6,7]; // months we have RM data for

let DATA = {otb:null, db:null, occ:null, fcst:null, daily:null};
let selectedProps = new Set();
let selectedMonths = new Set();
let selectedSegs = new Set(GS_SEGMENTS);

/* ─── Init ─── */
document.getElementById('today-date').textContent = new Date().toLocaleDateString('ko-KR');

async function loadData(){
  const load=async(url)=>{try{const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json();}catch(e){console.warn('Load fail:',url,e);return null;}};
  DATA.otb = await load('data/otb_data.json');
  DATA.db = await load('data/db_aggregated.json');
  DATA.occ = await load('data/occ_data.json');
  DATA.fcst = await load('data/rm_fcst.json');
  DATA.daily = await load('data/daily_booking.json');
  console.log('DATA loaded:', {otb:!!DATA.otb, db:!!DATA.db, occ:!!DATA.occ, fcst:!!DATA.fcst, daily:!!DATA.daily});
  if(DATA.occ) console.log('OCC props:', Object.keys(DATA.occ.properties||{}));
  initUI();
}

function initUI(){
  // Property list
  const propList = document.getElementById('prop-list');
  PROPERTIES.forEach(p=>{
    const div = document.createElement('div');
    div.className='prop-item';
    div.innerHTML=`<input type="checkbox" id="prop-${p.id}" data-id="${p.id}"><label for="prop-${p.id}">${p.id}. ${p.label}</label>`;
    div.querySelector('input').addEventListener('change',e=>{
      if(e.target.checked) selectedProps.add(p.id); else selectedProps.delete(p.id);
      div.classList.toggle('active',e.target.checked);
    });
    propList.appendChild(div);
  });

  // Month chips
  const monthChips = document.getElementById('month-chips');
  AVAIL_MONTHS.forEach(m=>{
    const chip = document.createElement('div');
    chip.className='chip';
    chip.textContent=m+'월';
    chip.dataset.month=m;
    chip.addEventListener('click',()=>{
      if(selectedMonths.has(m)) selectedMonths.delete(m); else selectedMonths.add(m);
      chip.classList.toggle('active',selectedMonths.has(m));
    });
    monthChips.appendChild(chip);
  });

  // Segment chips — GS 세그먼트만 표시
  const segChips = document.getElementById('seg-chips');
  GS_SEGMENTS.forEach(s=>{
    const chip = document.createElement('div');
    chip.className='seg-chip active';
    chip.textContent=s;
    chip.addEventListener('click',()=>{
      if(selectedSegs.has(s)) selectedSegs.delete(s); else selectedSegs.add(s);
      chip.classList.toggle('active',selectedSegs.has(s));
    });
    segChips.appendChild(chip);
  });

  // Select all buttons
  document.getElementById('btn-prop-all').addEventListener('click',()=>{
    const allSelected = selectedProps.size===PROPERTIES.length;
    document.querySelectorAll('#prop-list input[type=checkbox]').forEach(cb=>{
      cb.checked=!allSelected;
      const id=cb.dataset.id;
      if(!allSelected) selectedProps.add(id); else selectedProps.delete(id);
      cb.closest('.prop-item').classList.toggle('active',!allSelected);
    });
  });
  document.getElementById('btn-month-all').addEventListener('click',()=>{
    const allSelected = selectedMonths.size===AVAIL_MONTHS.length;
    document.querySelectorAll('#month-chips .chip').forEach(c=>{
      const m=parseInt(c.dataset.month);
      if(!allSelected){selectedMonths.add(m);c.classList.add('active');}
      else{selectedMonths.delete(m);c.classList.remove('active');}
    });
  });
}

/* ─── Data helpers ─── */
function getOtbYoy(otbName, month){
  if(!DATA.otb) return null;
  const row = DATA.otb.yoyTable.find(r=>r.name===otbName);
  if(!row) return null;
  return row.months[String(month)] || null;
}

function getOtbByProp(otbName){
  if(!DATA.otb) return null;
  return DATA.otb.byProperty.find(r=>r.name===otbName) || null;
}

function getOcc(occName, month){
  if(!DATA.occ) return null;
  const key = `2026-${String(month).padStart(2,'0')}`;
  const props = DATA.occ.properties || {};
  if(props[occName]) return props[occName][key] ?? null;
  return null;
}

// 전체 OTB (all segments) monthly from db_aggregated by_property
function getTotalMonthly(dbName, month){
  if(!DATA.db) return null;
  const bp = DATA.db.by_property;
  if(!bp[dbName]) return null;
  const mKey = `2026${String(month).padStart(2,'0')}`;
  return bp[dbName][mKey] || null;
}

// GS segments monthly
function getGsData(dbName, month, segs){
  if(!DATA.db) return null;
  const bps = DATA.db.by_property_segment;
  if(!bps[dbName]) return null;
  const mKey = `2026${String(month).padStart(2,'0')}`;
  let totalRn=0, totalRev=0;
  segs.forEach(seg=>{
    if(bps[dbName][seg] && bps[dbName][seg][mKey]){
      const d = bps[dbName][seg][mKey];
      totalRn += d.net_rn||0;
      totalRev += d.net_rev||0;
    }
  });
  const adr = totalRn>0 ? totalRev/totalRn : 0;
  return {rn:totalRn, rev:totalRev, adr:Math.round(adr*1000)}; // rev 백만, adr 원
}

// rm_fcst.json: Budget RN/REV + RM FCST RN/REV per property per month
// Schema: {rm_budget_rn, rm_budget_rev_mil, rm_fcst_rn, rm_fcst_rev_mil}
function getRmFcst(otbName, month){
  if(!DATA.fcst) return null;
  const props = DATA.fcst.properties || {};
  const key = `2026-${String(month).padStart(2,'0')}`;
  if(props[otbName] && props[otbName][key]) return props[otbName][key];
  return null;
}
function getRmTotal(month){
  if(!DATA.fcst || !DATA.fcst.total) return null;
  const key = `2026-${String(month).padStart(2,'0')}`;
  return DATA.fcst.total[key] || null;
}

// daily_booking.json: Booking Status (Budget RN/Actual RN + Budget OCC/Actual OCC)
function getDailyBooking(prop, month){
  if(!DATA.daily) return null;
  const md = (DATA.daily.months_detail||[]).find(m=>m.month===month);
  if(!md) return null;
  const name = prop.daily || prop.db;
  return (md.properties||[]).find(x=>x.name===name) || null;
}

/* ─── Format helpers ─── */
let lastMonthData = [];
const fmt = (n,dec=0)=>{
  if(n==null || isNaN(n)) return '—';
  return n.toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
};
const fmtPct = (n,dec=1)=>{
  if(n==null || isNaN(n)) return '—';
  return n.toFixed(dec)+'%';
};
const fmtRev = (n)=>{
  if(n==null || isNaN(n)) return '—';
  // n is in 백만원
  return Math.round(n).toLocaleString('ko-KR');
};
const fmtRevWon = (n)=>{
  if(n==null || isNaN(n)) return '—';
  // n is in 원
  return Math.round(n/100000000).toLocaleString('ko-KR')+'억';
};
const pctClass = (v)=> v==null?'':v>=100?'pos':'neg';

/* ─── Generate tables ─── */
function generateTables(){
  const output = document.getElementById('output-area');
  if(selectedProps.size===0 || selectedMonths.size===0){
    output.innerHTML='<div class="empty-state"><div class="icon">⚠️</div>사업장과 월을 선택해주세요</div>';
    return;
  }

  const selPropsArr = PROPERTIES.filter(p=>selectedProps.has(p.id));
  const selMonthsArr = [...selectedMonths].sort((a,b)=>a-b);
  const segsArr = [...selectedSegs];
  const propLabel = selPropsArr.length>1 ? selPropsArr.map(p=>p.label).join(' + ') : selPropsArr[0].label;

  // Build per-month aggregated data
  lastMonthData = selMonthsArr.map(month=>{
    /* ── 전체 (Booking Status + Revenue Meeting) ── */
    let t_bud_rn=0, t_bud_occ=0, t_bud_adr_w=0, t_bud_rev=0;
    let t_otb_rn=0, t_otb_occ=0;
    let t_fcst_rn=0;
    let rm_cnt=0;

    /* ── GS (db_aggregated segments: OTA+G-OTA+Inbound) ── */
    let gs_bud_rn=0, gs_otb_rn=0, gs_fcst_rn=0;
    let gs_otb_rev=0;
    let gs_adr_bud_w=0, gs_bud_rn_bp=0;

    let t_fcst_rev_k=0;
    let t_bud_adr_rn=0;
    selPropsArr.forEach(p=>{
      // 전체 RNs/OCC: Booking Status (daily_booking.json)
      const db = getDailyBooking(p, month);
      if(db){
        t_bud_rn += db.budget_rns||0;
        t_otb_rn += db.actual_rns||0;
        t_bud_occ += db.occ_budget||0;
        t_otb_occ += db.occ_actual||0;
        rm_cnt++;
      }
      // 전체 Budget REV/FCST RN/FCST REV: Revenue Meeting (rm_fcst.json)
      const rm = getRmFcst(p.otb, month);
      if(rm){
        t_bud_rev += (rm.rm_budget_rev_mil||0)*1000; // 백만→천원
        t_fcst_rn += rm.rm_fcst_rn||0;
        t_fcst_rev_k += (rm.rm_fcst_rev_mil||0)*1000; // 백만→천원
        // Budget ADR (원) = REV/RN, weighted by Budget RN
        if(rm.rm_budget_rn>0){
          const adr_won = (rm.rm_budget_rev_mil||0)*1000000/rm.rm_budget_rn;
          t_bud_adr_w += adr_won*rm.rm_budget_rn;
          t_bud_adr_rn += rm.rm_budget_rn;
        }
      }

      // GS OTB/REV: db_aggregated by_property_segment (세그먼트 필터링)
      const gs = getGsData(p.db, month, segsArr);
      if(gs){
        gs_otb_rn += gs.rn;
        gs_otb_rev += gs.rev;
      }
      // GS Budget/FCST: yoyTable 전체 대비 세그먼트 비율로 안분
      const yoy = getOtbYoy(p.otb, month);
      if(yoy && gs){
        const totalOtb = yoy.act_rn||1;
        const segRatio = gs.rn / totalOtb;
        gs_bud_rn += Math.round((yoy.bud_rn||0) * segRatio);
        gs_fcst_rn += Math.round((yoy.rns_fcst||0) * segRatio);
      } else if(yoy){
        gs_bud_rn += yoy.bud_rn||0;
        gs_fcst_rn += yoy.rns_fcst||0;
      }
      // GS ADR budget from byProperty yearly weighted avg
      const bp = getOtbByProp(p.otb);
      if(bp){
        gs_adr_bud_w += (bp.adr_budget||0) * (bp.rns_budget||0);
        gs_bud_rn_bp += bp.rns_budget||0;
      }
    });

    /* ── 전체 계산 ── */
    // 총 객실수 역산: total_rooms = bud_rn / (bud_occ/100)
    const t_bud_occ_avg = rm_cnt>0 ? t_bud_occ/rm_cnt : null;
    const t_otb_occ_avg = rm_cnt>0 ? t_otb_occ/rm_cnt : null;
    const total_rooms = (t_bud_occ_avg&&t_bud_rn) ? Math.round(t_bud_rn/(t_bud_occ_avg/100)) : null;
    // 전체 OCC FCST
    const t_fcst_occ = (total_rooms&&t_fcst_rn) ? t_fcst_rn/total_rooms*100 : null;
    const t_occ_ach = (t_bud_occ_avg&&t_otb_occ_avg) ? t_otb_occ_avg/t_bud_occ_avg*100 : null;
    const t_occ_f_diff = (t_fcst_occ!=null&&t_bud_occ_avg!=null) ? t_fcst_occ-t_bud_occ_avg : null;
    const t_occ_f_ach = (t_bud_occ_avg&&t_fcst_occ) ? t_fcst_occ/t_bud_occ_avg*100 : null;
    // RNs
    const t_rn_ach = t_bud_rn>0 ? t_otb_rn/t_bud_rn*100 : null;
    const t_fcst_ach_rn = t_bud_rn>0 ? t_fcst_rn/t_bud_rn*100 : null;
    const t_fcst_diff_rn = t_fcst_rn>0 ? t_fcst_rn - t_bud_rn : null;
    // ADR (원 → 천원). OTB ADR ≈ Budget ADR (Booking Status PDF에 OTB ADR 없음)
    const t_adr_bud = t_bud_adr_rn>0 ? Math.round(t_bud_adr_w/t_bud_adr_rn/1000) : null;
    const t_adr_otb = t_adr_bud;
    const t_adr_ach = t_adr_bud ? 100 : null;
    const t_adr_fcst = t_adr_bud; // FCST ADR ≈ Budget ADR
    const t_adr_f_diff = 0;
    const t_adr_f_ach = t_adr_bud ? 100 : null;
    // REV (천원 → 백만원 표시). OTB REV = OTB RN × Budget ADR (proxy)
    const t_rev_bud = t_bud_rev>0 ? Math.round(t_bud_rev/1000) : null;
    const t_rev_otb = (t_otb_rn>0&&t_adr_bud) ? Math.round(t_otb_rn*t_adr_bud/1000) : null;
    const t_rev_ach = (t_rev_bud&&t_rev_otb) ? t_rev_otb/t_rev_bud*100 : null;
    const t_rev_fcst = t_fcst_rev_k>0 ? Math.round(t_fcst_rev_k/1000) : null;
    const t_rev_f_diff = (t_rev_fcst!=null&&t_rev_bud!=null) ? t_rev_fcst-t_rev_bud : null;
    const t_rev_f_ach = (t_rev_bud&&t_rev_fcst) ? t_rev_fcst/t_rev_bud*100 : null;

    /* ── GS 계산 ── */
    // GS OCC (GS RN / 전체 총객실)
    const gs_occ_bud = (total_rooms&&gs_bud_rn) ? gs_bud_rn/total_rooms*100 : null;
    const gs_occ_otb = (total_rooms&&gs_otb_rn) ? gs_otb_rn/total_rooms*100 : null;
    const gs_occ_ach = (gs_occ_bud&&gs_occ_otb) ? gs_occ_otb/gs_occ_bud*100 : null;
    const gs_occ_fcst = (total_rooms&&gs_fcst_rn) ? gs_fcst_rn/total_rooms*100 : null;
    const gs_occ_f_diff = (gs_occ_fcst!=null&&gs_occ_bud!=null) ? gs_occ_fcst-gs_occ_bud : null;
    const gs_occ_f_ach = (gs_occ_bud&&gs_occ_fcst) ? gs_occ_fcst/gs_occ_bud*100 : null;
    // GS RNs
    const gs_rn_ach = gs_bud_rn>0 ? gs_otb_rn/gs_bud_rn*100 : null;
    const gs_fcst_ach_rn = gs_bud_rn>0 ? gs_fcst_rn/gs_bud_rn*100 : null;
    const gs_fcst_diff_rn = gs_fcst_rn - gs_bud_rn;
    // GS ADR (천원)
    const gs_adr_otb = gs_otb_rn>0 ? Math.round(gs_otb_rev/gs_otb_rn*1000) : null;
    const gs_adr_bud = gs_bud_rn_bp>0 ? Math.round(gs_adr_bud_w/gs_bud_rn_bp/1000) : null;
    const gs_adr_fcst = gs_adr_bud; // FCST ADR ≈ Budget ADR
    const gs_adr_ach = (gs_adr_bud&&gs_adr_otb) ? gs_adr_otb/gs_adr_bud*100 : null;
    const gs_adr_f_diff = 0;
    const gs_adr_f_ach = gs_adr_bud ? 100 : null;
    // GS REV (백만원)
    const gs_rev_otb = gs_otb_rev;
    const gs_rev_bud = (gs_bud_rn&&gs_adr_bud) ? Math.round(gs_bud_rn*gs_adr_bud/1000) : null;
    const gs_rev_fcst = (gs_fcst_rn&&gs_adr_fcst) ? Math.round(gs_fcst_rn*gs_adr_fcst/1000) : null;
    const gs_rev_ach = (gs_rev_bud&&gs_rev_otb) ? gs_rev_otb/gs_rev_bud*100 : null;
    const gs_rev_f_diff = (gs_rev_fcst!=null&&gs_rev_bud!=null) ? gs_rev_fcst-gs_rev_bud : null;
    const gs_rev_f_ach = (gs_rev_bud&&gs_rev_fcst) ? gs_rev_fcst/gs_rev_bud*100 : null;

    return {month,
      t_bud_occ_avg, t_otb_occ_avg, t_occ_ach, t_fcst_occ, t_occ_f_diff, t_occ_f_ach,
      t_bud_rn, t_otb_rn, t_rn_ach, t_fcst_rn, t_fcst_diff_rn, t_fcst_ach_rn,
      t_adr_bud, t_adr_otb, t_adr_ach, t_adr_fcst, t_adr_f_diff, t_adr_f_ach,
      t_rev_bud, t_rev_otb, t_rev_ach, t_rev_fcst, t_rev_f_diff, t_rev_f_ach,
      gs_occ_bud, gs_occ_otb, gs_occ_ach, gs_occ_fcst, gs_occ_f_diff, gs_occ_f_ach,
      gs_bud_rn, gs_otb_rn, gs_rn_ach, gs_fcst_rn, gs_fcst_diff_rn, gs_fcst_ach_rn,
      gs_adr_bud, gs_adr_otb, gs_adr_ach, gs_adr_fcst, gs_adr_f_diff, gs_adr_f_ach,
      gs_rev_bud, gs_rev_otb, gs_rev_ach, gs_rev_fcst, gs_rev_f_diff, gs_rev_f_ach};
  });

  // cell helpers
  const cell=(v,f=fmt)=>(v!=null&&!isNaN(v))?f(v):'—';
  const diffCell=(v,f=fmt)=>{
    if(v==null||isNaN(v)) return '<td>—</td>';
    const cls=v>=0?'pos':'neg'; const sign=v>=0?'+':'';
    return `<td class="${cls}">${sign}${f(v)}</td>`;
  };
  const pctCell=(v)=>{
    if(v==null||isNaN(v)) return '<td class="pct-cell">—</td>';
    return `<td class="pct-cell ${pctClass(v)}">${fmtPct(v)}</td>`;
  };

  // Render
  let rows = '';
  const monthData = lastMonthData;
  monthData.forEach((d,idx)=>{
    const border = idx>0 ? 'border-top:2px solid var(--rule-strong);' : '';

    rows += `
      <tr style="${border}">
        <td class="row-label" rowspan="4" style="vertical-align:middle;font-size:14px;font-weight:800;color:var(--gold);text-align:center;">${d.month}월</td>
        <td class="row-label">OCC</td>
        <td>${fmtPct(d.t_bud_occ_avg)}</td><td>${fmtPct(d.t_otb_occ_avg)}</td>${pctCell(d.t_occ_ach)}
        <td>${fmtPct(d.t_fcst_occ)}</td>${diffCell(d.t_occ_f_diff,v=>v.toFixed(1)+'%p')}${pctCell(d.t_occ_f_ach)}
        <td>${fmtPct(d.gs_occ_bud)}</td><td>${fmtPct(d.gs_occ_otb)}</td>${pctCell(d.gs_occ_ach)}
        <td>${fmtPct(d.gs_occ_fcst)}</td>${diffCell(d.gs_occ_f_diff,v=>v.toFixed(1)+'%p')}${pctCell(d.gs_occ_f_ach)}
      </tr>
      <tr>
        <td class="row-label">RNs</td>
        <td>${cell(d.t_bud_rn)}</td><td>${cell(d.t_otb_rn)}</td>${pctCell(d.t_rn_ach)}
        <td>${cell(d.t_fcst_rn)}</td>${diffCell(d.t_fcst_diff_rn)}${pctCell(d.t_fcst_ach_rn)}
        <td>${cell(d.gs_bud_rn)}</td><td>${cell(d.gs_otb_rn)}</td>${pctCell(d.gs_rn_ach)}
        <td>${cell(d.gs_fcst_rn)}</td>${diffCell(d.gs_fcst_diff_rn)}${pctCell(d.gs_fcst_ach_rn)}
      </tr>
      <tr>
        <td class="row-label">ADR</td>
        <td>${cell(d.t_adr_bud)}</td><td>${cell(d.t_adr_otb)}</td>${pctCell(d.t_adr_ach)}
        <td>${cell(d.t_adr_fcst)}</td>${diffCell(d.t_adr_f_diff)}${pctCell(d.t_adr_f_ach)}
        <td>${cell(d.gs_adr_bud)}</td><td>${cell(d.gs_adr_otb)}</td>${pctCell(d.gs_adr_ach)}
        <td>${cell(d.gs_adr_fcst)}</td>${diffCell(d.gs_adr_f_diff)}${pctCell(d.gs_adr_f_ach)}
      </tr>
      <tr>
        <td class="row-label">REV<span style="font-size:9px;color:var(--ink-faint);margin-left:3px;">(백만)</span></td>

      <table class="forecast-table" id="forecast-main-table">
        <thead>

            <th colspan="6" style="border-bottom:2px solid var(--info);color:var(--info);">GS (${segsArr.join('+')})</th>
          </tr>
          <tr>
            <th style="width:80px;">목표</th><th style="width:80px;">현재OTB</th><th style="width:65px;">진행률</th>
            <th style="width:80px;">FCST</th><th style="width:80px;">증감</th><th style="width:65px;">달성률</th>

function downloadExcel(){
  const tbl = document.getElementById('forecast-main-table');
  if(!tbl) return;
  const wb = XLSX.utils.book_new();
  const selPropsArr = PROPERTIES.filter(p=>selectedProps.has(p.id));
  const propLabel = selPropsArr.length>1 ? selPropsArr.map(p=>p.label).join('+') : selPropsArr[0].label;
  const ws = XLSX.utils.table_to_sheet(tbl);
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
  const fname = `Forecast_${propLabel}_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, fname);
}

function getFormData(){

async function submitToSheet(){
  const url=document.getElementById('apps-script-url').value.trim()||localStorage.getItem('pumui_apps_script_url')||'';

/* ─── 요금안 엑셀 업로드 & 파싱 ─── */
let uploadedYokumData = null;
let uploadedYokumRendered = null;

function handleXlsxUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      uploadedYokumData = parseYokumXlsx(wb);
      renderYokumPreview(uploadedYokumData, file.name);
      showFormMsg('요금안 업로드 완료','success');
    } catch(err){
      showFormMsg('엑셀 파싱 오류: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value=''; // reset for re-upload
}

function parseYokumXlsx(wb){
  const result = {갑지:null, 상품:[], facility:null, facDist:null, commission:null, kpi:null};

  // 갑지 시트 파싱
  const gapjiName = wb.SheetNames.find(s=>s.trim().startsWith('갑지') && !s.includes('기존') && !s.includes('목표'));
  if(gapjiName){
    const ws = wb.Sheets[gapjiName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    const info = {};
    rows.forEach(r=>{
      const label = String(r[1]||'').trim();
      const val = String(r[3]||r[2]||'').trim();
      if(label==='판매채널') info.channel=val;
      if(label==='판매기간') info.salePeriod=val;
      if(label==='투숙기간') info.stayPeriod=val;
      if(label==='상품구성') info.product=val;
      if(label==='기준인원') info.people=val;
    });
    // 부대시설 요금 (갑지 "기 준" 행 = 3인 합산 정상가)
    const fac = {조식:null,석식:null,오션:null,레전드:null};
    let facSection=false;
    rows.forEach(r=>{
      if(String(r[1]||'').includes('부대시설 요금')) facSection=true;
      if(!facSection) return;
      const lbl = String(r[1]||'').trim();
      if(lbl==='기 준' && String(r[2]||'').includes('소인1')){
        if(typeof r[4]==='number') fac.조식=r[4];
        if(typeof r[6]==='number') fac.석식=r[6];
        if(typeof r[8]==='number') fac.오션=r[8];
        if(typeof r[10]==='number') fac.레전드=r[10];
      }
    });
    // 수수료, KPI 추출
    rows.forEach(r=>{
      for(let c=0; c<Math.min(r.length,6); c++){
        const lbl = String(r[c]||'').trim();
        if(lbl.includes('수수료') && !result.commission){
          const v = String(r[c+1]||r[c+2]||'').trim();
          if(v) result.commission = v;
        }
        if((lbl.includes('KPI')||lbl.includes('kpi')) && !result.kpi){
          const v = String(r[c+1]||r[c+2]||'').trim();
          if(v) result.kpi = v;
        }
      }
    });
    result.갑지 = info;
    result.facility = fac;
  }

  // 상품 시트 탐색: 갑지, 패키지번호요청 제외한 모든 시트를 후보로
  const excludePatterns = ['갑지','패키지번호','패키지 번호'];
  const productSheetNames = wb.SheetNames.filter(s=>{
    const t = s.trim();
    if(/^상품[①②③④⑤⑥⑦⑧⑨⑩]$/.test(t)) return true;
    if(excludePatterns.some(ex=>t.includes(ex))) return false;
    return true;
  });

  productSheetNames.forEach(sn=>{
    const ws = wb.Sheets[sn];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    const product = {name:sn, items:[]};
    const n = v => { const x=Number(v); return (v!=null&&v!==''&&!isNaN(x)&&x>1000)?x:null; };
    const pct = v => { const x=Number(v); return (v!=null&&v!==''&&!isNaN(x))?x:null; };

    // 헤더 패턴 탐색: Row 16~25 범위에서 "정상가" 포함 행 찾기
    let headerRowIdx = -1;
    for(let ri=14; ri<Math.min(28, rows.length); ri++){
      const r = rows[ri]||[];
      if(r.some(c=>String(c||'').includes('정상가'))){
        headerRowIdx = ri;
        break;
      }
    }
    if(headerRowIdx<0){
      console.log('[요금안파서] '+sn+': 헤더 패턴 미발견, skip');
      return;
    }

    const hdr18 = rows[headerRowIdx]||[];
    const hdr19 = rows[headerRowIdx+1]||[];
    const hdr20 = rows[headerRowIdx+2]||[];

    // 정상가 객실 컬럼: hdr18에서 "정상가", hdr19에서 "객실", hdr20에서 "기명"
    let regCol = -1;
    for(let c=5; c<hdr18.length; c++){
      if(String(hdr18[c]||'').includes('정상가')){
        for(let j=c; j<c+5&&j<hdr19.length; j++){
          if(String(hdr19[j]||'').replace(/\s/g,'').includes('객실')){
            for(let k=j; k<j+5&&k<hdr20.length; k++){
              if(String(hdr20[k]||'').includes('기명')&&!String(hdr20[k]||'').includes('무기명')){
                regCol=k; break;
              }
            }
            if(regCol>0) break;
          }
        }
        if(regCol>0) break;
      }
    }
    if(regCol<0) regCol = 6;

    // 배분가 컬럼 탐색
    let distCol = -1;
    for(let c=10; c<hdr18.length; c++){
      if(String(hdr18[c]||'').includes('배분가')){
        for(let j=c; j<c+6&&j<hdr20.length; j++){
          if(String(hdr20[j]||'').includes('기명')&&!String(hdr20[j]||'').includes('무기명')){distCol=j; break;}
        }
        if(distCol>0) break;
      }
    }
    if(distCol<0){
      for(let c=14; c<hdr19.length; c++){
        if(String(hdr19[c]||'').replace(/\s/g,'').includes('객실')){
          const above = String(hdr18[c]||'').trim();
          if(above===''||above.includes('배분')){
            for(let j=c; j<c+5&&j<hdr20.length; j++){
              if(String(hdr20[j]||'').includes('기명')&&!String(hdr20[j]||'').includes('무기명')){distCol=j; break;}
            }
            if(distCol>0) break;
          }
        }
      }
    }

    // 판매가 3인 컬럼
    let sellCol = -1;
    for(let c=25; c<hdr18.length; c++){
      if(String(hdr18[c]||'').includes('3인')||String(hdr18[c]||'').includes('소인1')){
        for(let j=c; j<c+5&&j<hdr20.length; j++){
          if(String(hdr20[j]||'').includes('기명')){sellCol=j; break;}
        }
        break;
      }
    }

    // 시즌 컬럼
    let seasonCol = -1;
    for(let c=0; c<10; c++){
      const h = String(hdr18[c]||hdr20[c]||'').trim();
      if(h.includes('시즌')){seasonCol=c; break;}
    }
    if(seasonCol<0) seasonCol = 5;

    // 데이터 행 파싱
    const dataStartRow = headerRowIdx + 3;
    for(let i=dataStartRow; i<rows.length; i++){
      const r = rows[i];
      if(!r || r.length<10) continue;
      const season = String(r[seasonCol]||'').trim();
      if(!season) continue;
      const item = {
        season,
        regular: {named:n(r[regCol]), unnamed:n(r[regCol+1]), fit:n(r[regCol+2])},
        distributed: distCol>0 ? {named:n(r[distCol]), unnamed:n(r[distCol+2]), fit:n(r[distCol+4])} : {named:null,unnamed:null,fit:null},
        distDiscount: distCol>0 ? {named:pct(r[distCol+1]), unnamed:pct(r[distCol+3]), fit:pct(r[distCol+5])} : {named:null,unnamed:null,fit:null},
        selling3: sellCol>0 ? {named:n(r[sellCol]), unnamed:n(r[sellCol+1]), fit:n(r[sellCol+2])} : {named:null,unnamed:null,fit:null},
      };
      if(item.regular.named!=null || item.regular.unnamed!=null) product.items.push(item);
    }
    console.log('[요금안파서]', sn, 'headerRow='+(headerRowIdx+1), 'regCol='+regCol, 'distCol='+distCol, 'sellCol='+sellCol, 'items='+product.items.length);
    if(product.items.length>0){
      console.log('[요금안파서] 첫 아이템:', JSON.stringify(product.items[0]));
      result.상품.push(product);
    }
  });

  // 부대시설 배분가 추출 — 모든 상품 시트 탐색, 첫 발견 사용
  const facDist = {조식:null,석식:null,오션:null,레전드:null};
  const facSheetOrder = ['상품③','상품②','상품①', ...productSheetNames];
  const facSheetUniq = [...new Set(facSheetOrder)].filter(s=>wb.SheetNames.includes(s));
  for(const sn of facSheetUniq){
    const ws = wb.Sheets[sn];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    let hdrIdx = -1;
    for(let ri=14; ri<Math.min(28,rows.length); ri++){
      if(rows[ri]&&rows[ri].some(c=>String(c||'').includes('정상가'))){hdrIdx=ri; break;}
    }
    if(hdrIdx<0) continue;
    const hdr19 = rows[hdrIdx+1]||[];
    const hdr20 = rows[hdrIdx+2]||[];
    const dataRow = rows[hdrIdx+3]||[];
    let secStart = -1;
    for(let c=20; c<hdr19.length; c++){
      const h = String(hdr19[c]||'').trim();
      if((h.includes('부대시설')&&h.includes('소인1'))||h.includes('소인1')){secStart=c; break;}
    }
    if(secStart<0) continue;
    for(let c=secStart; c<secStart+12&&c<hdr20.length; c++){
      const h = String(hdr20[c]||'').trim();
      const val = Number(dataRow[c]);
      if(isNaN(val)||val<=0) continue;
      if(val>3000 && val<500000){
        if(h.includes('조식')&&!facDist.조식) facDist.조식=val;
        else if(h.includes('석식')&&!facDist.석식) facDist.석식=val;
        else if((h.includes('오션')||h.includes('요트'))&&!facDist.오션) facDist.오션=val;
        else if(h.includes('레전드')&&!facDist.레전드) facDist.레전드=val;
      }
    }
    if(Object.values(facDist).some(v=>v!=null)) break;
  }
  result.facDist = facDist;

  return result;
}

function renderYokumPreview(data, filename){
  const preview = document.getElementById('xlsx-preview');
  const pricingSection = document.getElementById('pricing-section');
  if(!data || !data.상품.length){
    preview.innerHTML='<div style="color:var(--ink-faint);font-size:12px;">파싱된 요금 데이터가 없습니다.</div>';
    pricingSection.style.display='none';
    return;
  }

  // 모든 상품 시트의 아이템 합치기 — 전시즌 range
  const allItems = data.상품.flatMap(p=>p.items);
  console.log('[요금안렌더] allItems='+allItems.length, 'seasons:', [...new Set(allItems.map(i=>i.season))]);

  const minMax = (arr, fn) => {
    const nums = arr.map(fn).filter(v=>v!=null&&!isNaN(v)&&v>0);
    if(!nums.length) return null;
    const mn=Math.min(...nums), mx=Math.max(...nums);
    return {min:mn, max:mx};
  };
  const fmtK = v => typeof v==='number' ? Math.round(v/1000).toLocaleString('ko-KR') : '—';
  const rangeK = mm => {
    if(!mm) return '—';
    const a=fmtK(mm.min), b=fmtK(mm.max);
    return a===b ? a : `${a}~${b}`;
  };
  // 아이템별 할인율 계산 후 min~max
  const discRangeFromItems = (arr, regFn, distFn) => {
    const rates = arr.map(it=>{
      const reg = regFn(it), dist = distFn(it);
      if(!reg||!dist||reg<=0) return null;
      return Math.round((1-dist/reg)*100);
    }).filter(v=>v!=null);
    if(!rates.length) return '—';
    const lo=Math.min(...rates), hi=Math.max(...rates);
    if(lo===hi) return `${lo}%`;
    return `${hi}%~${lo}%`;
  };

  // ── 객실 전체 시즌 range ──
  const roomRegUnnamed = minMax(allItems, i=>i.regular.unnamed);
  const roomRegFit = minMax(allItems, i=>i.regular.fit);
  const roomDistUnnamed = minMax(allItems, i=>i.distributed.unnamed);
  const roomDistFit = minMax(allItems, i=>i.distributed.fit);
  const roomDiscUnnamed = discRangeFromItems(allItems, i=>i.regular.unnamed, i=>i.distributed.unnamed);
  const roomDiscFit = discRangeFromItems(allItems, i=>i.regular.fit, i=>i.distributed.fit);

  // ── 배분적부가기준비율: (배분가/정상가)*100 min~max ──
  const ratios = allItems.map(it=>{
    const reg = it.regular.unnamed, dist = it.distributed.unnamed;
    if(!reg||!dist||reg<=0) return null;
    return Math.round(dist/reg*100);
  }).filter(v=>v!=null);
  const ratioMin = ratios.length ? Math.min(...ratios) : null;
  const ratioMax = ratios.length ? Math.max(...ratios) : null;
  const ratioStr = ratioMin!=null ? (ratioMin===ratioMax ? `${ratioMin}` : `${ratioMin}~${ratioMax}`) : '—';

  // ── 부대시설 ──
  const fac = data.facility || {};
  const facD = data.facDist || {};
  const facTotal = (fac.조식||0)+(fac.석식||0)+(fac.오션||0)+(fac.레전드||0);
  const facDistTotal = (facD.조식||0)+(facD.석식||0)+(facD.오션||0)+(facD.레전드||0);
  const facNote = data.갑지?.people || '구성3인기준';
  const facDisc = (reg,dist) => (reg&&dist&&reg>0) ? Math.round((1-dist/reg)*100)+'%' : '—';

  // ── 패키지 합산 (객실+부대) ──
  const pkgRegUnnamed = minMax(allItems, i=>i.regular.unnamed ? i.regular.unnamed+facTotal : null);
  const pkgRegFit = minMax(allItems, i=>i.regular.fit ? i.regular.fit+facTotal : null);
  const pkgDistUnnamed = minMax(allItems, i=>i.distributed.unnamed ? i.distributed.unnamed+facDistTotal : null);
  const pkgDistFit = minMax(allItems, i=>i.distributed.fit ? i.distributed.fit+facDistTotal : null);
  const pkgDiscUnnamed = discRangeFromItems(allItems,
    i=>i.regular.unnamed ? i.regular.unnamed+facTotal : null,
    i=>i.distributed.unnamed ? i.distributed.unnamed+facDistTotal : null);
  const pkgDiscFit = discRangeFromItems(allItems,
    i=>i.regular.fit ? i.regular.fit+facTotal : null,
    i=>i.distributed.fit ? i.distributed.fit+facDistTotal : null);

  // ── 판매가 ──
  const sellUnnamed = minMax(allItems, i=>i.selling3?.unnamed);
  const sellFit = minMax(allItems, i=>i.selling3?.fit);
  const sellDiscUnnamed = discRangeFromItems(allItems, i=>i.regular.unnamed, i=>i.selling3?.unnamed);
  const sellDiscFit = discRangeFromItems(allItems, i=>i.regular.fit, i=>i.selling3?.fit);

  // 수수료 / KPI
  const commission = data.commission || '';
  const kpi = data.kpi || '';

  // ── HTML 생성 ──
  let html = '';

  // 객실
  html += `
  <div style="margin-top:16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:700;">객실</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);font-weight:700;letter-spacing:0.08em;">[단위:천원]</span>
    </div>
    <table class="sub-table">
      <thead><tr><th style="width:80px;">구 분</th><th>회원(무기명)</th><th>FIT</th></tr></thead>
      <tbody>
        <tr><th>정상가</th><td>${rangeK(roomRegUnnamed)}</td><td>${rangeK(roomRegFit)}</td></tr>
        <tr><th>배분가</th><td>${rangeK(roomDistUnnamed)}</td><td>${rangeK(roomDistFit)}</td></tr>
        <tr><th>할인율</th><td>${roomDiscUnnamed}</td><td>${roomDiscFit}</td></tr>
      </tbody>
    </table>
  </div>`;

  // 배분적부가기준비율
  html += `
  <div style="margin-top:12px;padding:8px 12px;background:var(--bg-deep);border:1px solid var(--rule);border-radius:4px;display:flex;align-items:center;gap:8px;">
    <span style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);font-weight:700;">배분적부가기준비율</span>
    <span style="font-family:var(--mono);font-size:13px;color:var(--gold-bright);font-weight:800;">${ratioStr}</span>
  </div>`;

  // 식음/액티
  html += `
  <div style="margin-top:16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:700;">식음/액티</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);font-weight:700;letter-spacing:0.08em;">[단위:천원]</span>
    </div>
    <table class="sub-table">
      <thead><tr><th style="width:80px;">구 분</th><th>조식</th><th>오션</th><th>석식</th><th>레전드</th><th>비고</th></tr></thead>
      <tbody>
        <tr><th>정상가</th><td>${fac.조식?fmtK(fac.조식):'—'}</td><td>${fac.오션?fmtK(fac.오션):'—'}</td><td>${fac.석식?fmtK(fac.석식):'—'}</td><td>${fac.레전드?fmtK(fac.레전드):'—'}</td><td rowspan="3">${facNote}</td></tr>
        <tr><th>배분가</th><td>${facD.조식?fmtK(facD.조식):'—'}</td><td>${facD.오션?fmtK(facD.오션):'—'}</td><td>${facD.석식?fmtK(facD.석식):'—'}</td><td>${facD.레전드?fmtK(facD.레전드):'—'}</td></tr>
        <tr><th>할인율</th><td>${facDisc(fac.조식,facD.조식)}</td><td>${facDisc(fac.오션,facD.오션)}</td><td>${facDisc(fac.석식,facD.석식)}</td><td>${facDisc(fac.레전드,facD.레전드)}</td></tr>
      </tbody>
    </table>
  </div>`;

  // 패키지 합산
  html += `
  <div style="margin-top:16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:700;">패키지 (객실+부대 합산)</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);font-weight:700;letter-spacing:0.08em;">[단위:천원]</span>
    </div>
    <table class="sub-table">
      <thead><tr><th style="width:80px;">구 분</th><th>회원(무기명)</th><th>FIT</th></tr></thead>
      <tbody>
        <tr><th>정상가</th><td>${rangeK(pkgRegUnnamed)}</td><td>${rangeK(pkgRegFit)}</td></tr>
        <tr><th>배분가</th><td>${rangeK(pkgDistUnnamed)}</td><td>${rangeK(pkgDistFit)}</td></tr>
        <tr><th>할인율</th><td>${pkgDiscUnnamed}</td><td>${pkgDiscFit}</td></tr>
      </tbody>
    </table>
  </div>`;

  // 판매가
  html += `
  <div style="margin-top:16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:700;">판매가</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);font-weight:700;letter-spacing:0.08em;">[단위:천원 / 구성 3인기준]</span>
    </div>
    <table class="sub-table">
      <thead><tr><th style="width:80px;">구 분</th><th>회원(무기명)</th><th>FIT</th></tr></thead>
      <tbody>
        <tr><th>정상가</th><td>${rangeK(sellUnnamed)}</td><td>${rangeK(sellFit)}</td></tr>
        <tr><th>할인율</th><td>${sellDiscUnnamed}</td><td>${sellDiscFit}</td></tr>
      </tbody>
    </table>
  </div>`;

  // 수수료 / KPI
  if(commission || kpi){
    html += `
    <div style="margin-top:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:700;">수수료 / KPI</span>
      </div>
      <div style="display:flex;gap:24px;padding:8px 12px;background:var(--bg-deep);border:1px solid var(--rule);border-radius:4px;font-family:var(--mono);font-size:12px;">
        ${commission?`<div><span style="color:var(--ink-muted);">수수료:</span> <span style="color:var(--ink);font-weight:700;">${commission}</span></div>`:''}
        ${kpi?`<div><span style="color:var(--ink-muted);">KPI:</span> <span style="color:var(--ink);font-weight:700;">${kpi}</span></div>`:''}
      </div>
    </div>`;
  }

  // 렌더링 데이터 저장 (Excel 다운로드용)
  uploadedYokumRendered = {
    room:{regUnnamed:roomRegUnnamed, regFit:roomRegFit, distUnnamed:roomDistUnnamed, distFit:roomDistFit, discUnnamed:roomDiscUnnamed, discFit:roomDiscFit},
    ratio:ratioStr, fac, facD, facNote,
    pkg:{regUnnamed:pkgRegUnnamed, regFit:pkgRegFit, distUnnamed:pkgDistUnnamed, distFit:pkgDistFit, discUnnamed:pkgDiscUnnamed, discFit:pkgDiscFit},
    sell:{unnamed:sellUnnamed, fit:sellFit, discUnnamed:sellDiscUnnamed, discFit:sellDiscFit},
    commission, kpi
  };

  pricingSection.innerHTML = html;
  pricingSection.style.display = '';

  // 갑지 정보 폼에 자동 입력
  if(data.갑지){
    const g=data.갑지;
    const setInput = (id,v) => { const el=document.getElementById(id); if(el) el.value=v||''; };
    setInput('f-channel', g.channel);
    setInput('f-sale-period', g.salePeriod);
    setInput('f-stay-period', g.stayPeriod);
    setInput('f-product', g.product);
  }

  // 프리뷰 요약
  preview.innerHTML = `<div style="padding:8px 12px;background:var(--bg-soft);border:1px solid var(--rule);border-radius:6px;font-size:11px;color:var(--ink-muted);">
    <span style="color:var(--gold);font-weight:700;">✓ ${filename}</span> —
    상품 ${data.상품.length}개 시트, ${allItems.length}개 요금행 파싱 완료.
  </div>`;
}

function addToExcelDownload(){
  if(!lastMonthData.length){showFormMsg('먼저 Forecast 테이블을 생성해주세요','error');return;}

  const wb = XLSX.utils.book_new();
  const selPropsArr = PROPERTIES.filter(p=>selectedProps.has(p.id));
  const propLabel = selPropsArr.length>1 ? selPropsArr.map(p=>p.label).join('+') : selPropsArr[0].label;
  const segsArr = [...selectedSegs];

  // Forecast sheet — 수동 빌드 (셀 서식 적용)
  const header1 = ['월','항목','전체 (RM)','','','','','','GS ('+segsArr.join('+')+')','','','','',''];
  const header2 = ['','','목표','현재OTB','진행률','FCST','증감','달성률','목표','현재OTB','진행률','FCST','증감','달성률'];
  const aoa = [header1, header2];

  const revUnit = v => (v!=null&&!isNaN(v)) ? Math.round(v) : null; // 백만원

  lastMonthData.forEach(d=>{
    // OCC
    aoa.push([d.month+'월','OCC',
      d.t_bud_occ_avg!=null?d.t_bud_occ_avg/100:null, d.t_otb_occ_avg!=null?d.t_otb_occ_avg/100:null,
      d.t_occ_ach!=null?d.t_occ_ach/100:null,
      d.t_fcst_occ!=null?d.t_fcst_occ/100:null,
      d.t_occ_f_diff!=null?d.t_occ_f_diff/100:null,
      d.t_occ_f_ach!=null?d.t_occ_f_ach/100:null,
      d.gs_occ_bud!=null?d.gs_occ_bud/100:null, d.gs_occ_otb!=null?d.gs_occ_otb/100:null,
      d.gs_occ_ach!=null?d.gs_occ_ach/100:null,
      d.gs_occ_fcst!=null?d.gs_occ_fcst/100:null,
      d.gs_occ_f_diff!=null?d.gs_occ_f_diff/100:null,
      d.gs_occ_f_ach!=null?d.gs_occ_f_ach/100:null]);
    // RNs
    aoa.push(['','RNs',
      d.t_bud_rn||null, d.t_otb_rn||null, d.t_rn_ach!=null?d.t_rn_ach/100:null,
      d.t_fcst_rn||null, d.t_fcst_diff_rn, d.t_fcst_ach_rn!=null?d.t_fcst_ach_rn/100:null,
      d.gs_bud_rn||null, d.gs_otb_rn||null, d.gs_rn_ach!=null?d.gs_rn_ach/100:null,
      d.gs_fcst_rn||null, d.gs_fcst_diff_rn, d.gs_fcst_ach_rn!=null?d.gs_fcst_ach_rn/100:null]);
    // ADR
    aoa.push(['','ADR',
      d.t_adr_bud||null, d.t_adr_otb||null, d.t_adr_ach!=null?d.t_adr_ach/100:null,
      d.t_adr_fcst||null, d.t_adr_f_diff, d.t_adr_f_ach!=null?d.t_adr_f_ach/100:null,
      d.gs_adr_bud||null, d.gs_adr_otb||null, d.gs_adr_ach!=null?d.gs_adr_ach/100:null,
      d.gs_adr_fcst||null, d.gs_adr_f_diff, d.gs_adr_f_ach!=null?d.gs_adr_f_ach/100:null]);
    // REV
    aoa.push(['','REV',
      revUnit(d.t_rev_bud), revUnit(d.t_rev_otb), d.t_rev_ach!=null?d.t_rev_ach/100:null,
      revUnit(d.t_rev_fcst), revUnit(d.t_rev_f_diff), d.t_rev_f_ach!=null?d.t_rev_f_ach/100:null,
      revUnit(d.gs_rev_bud), revUnit(d.gs_rev_otb), d.gs_rev_ach!=null?d.gs_rev_ach/100:null,
      revUnit(d.gs_rev_fcst), revUnit(d.gs_rev_f_diff), d.gs_rev_f_ach!=null?d.gs_rev_f_ach/100:null]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // 셀 서식 적용
  const pctFmt = '0.0%';
  const numFmt = '#,##0';
  const diffPctFmt = '+0.0%p;-0.0%p;0.0%p';
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let R=2; R<=range.e.r; R++){
    const rowType = aoa[R]?.[1]; // OCC, RNs, ADR, REV
    for(let C=2; C<=13; C++){
      const addr = XLSX.utils.encode_cell({r:R,c:C});
      if(!ws[addr]) continue;
      const colIdx = (C-2)%6; // 0=목표,1=OTB,2=진행률,3=FCST,4=증감,5=달성률
      if(rowType==='OCC'){
        if(colIdx===4) ws[addr].z = '+0.0%p;-0.0%p;0.0%p';
        else ws[addr].z = pctFmt;
      } else if(rowType==='RNs'){
        if(colIdx===2||colIdx===5) ws[addr].z = pctFmt;
        else ws[addr].z = numFmt;
      } else if(rowType==='ADR'){
        if(colIdx===2||colIdx===5) ws[addr].z = pctFmt;
        else ws[addr].z = numFmt;
      } else if(rowType==='REV'){
        if(colIdx===2||colIdx===5) ws[addr].z = pctFmt;
        else ws[addr].z = '#,##0';
      }
    }
  }
  ws['!cols']=[{wch:6},{wch:6},{wch:10},{wch:10},{wch:8},{wch:10},{wch:10},{wch:8},{wch:10},{wch:10},{wch:8},{wch:10},{wch:10},{wch:8}];
  // 헤더 병합
  ws['!merges']=[
    {s:{r:0,c:2},e:{r:0,c:7}}, // 전체 (RM)
    {s:{r:0,c:8},e:{r:0,c:13}}, // GS
  ];
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast');

  // 기획전 상세 sheet
  const fd=getFormData();
  const yk = uploadedYokumRendered || {};
  const rkK = mm => { if(!mm) return '—'; const a=Math.round(mm.min/1000), b=Math.round(mm.max/1000); return a===b?a.toLocaleString('ko-KR'):`${a.toLocaleString('ko-KR')}~${b.toLocaleString('ko-KR')}`; };
  const fK = v => typeof v==='number' ? Math.round(v/1000).toLocaleString('ko-KR') : '—';
  const facD2 = (reg,dist) => (reg&&dist&&reg>0) ? Math.round((1-dist/reg)*100)+'%' : '—';
  const yFac = yk.fac||{}, yFacD = yk.facD||{};
  const detailRows=[
    ['3. 내 용'],
    ['구 분','내 용'],
    ['사업장',fd.property],
    ['채 널',fd.channel],
    ['판매일자',fd.salePeriod],
    ['투숙일자',fd.stayPeriod],
    ['상 품',fd.product],
    ['상품 비고',fd.productNote],
    [],
    ['객실 [단위:천원]','','회원(무기명)','FIT'],
    ['','정상가',rkK(yk.room?.regUnnamed),rkK(yk.room?.regFit)],
    ['','배분가',rkK(yk.room?.distUnnamed),rkK(yk.room?.distFit)],
    ['','할인율',yk.room?.discUnnamed||'—',yk.room?.discFit||'—'],
    [],
    ['배분적부가기준비율',yk.ratio||'—'],
    [],
    ['식음/액티 [단위:천원]','','조식','오션','석식','레전드','비고'],
    ['','정상가',fK(yFac.조식),fK(yFac.오션),fK(yFac.석식),fK(yFac.레전드),yk.facNote||''],
    ['','배분가',fK(yFacD.조식),fK(yFacD.오션),fK(yFacD.석식),fK(yFacD.레전드),''],
    ['','할인율',facD2(yFac.조식,yFacD.조식),facD2(yFac.오션,yFacD.오션),facD2(yFac.석식,yFacD.석식),facD2(yFac.레전드,yFacD.레전드),''],
    [],
    ['패키지 (객실+부대) [단위:천원]','','회원(무기명)','FIT'],
    ['','정상가',rkK(yk.pkg?.regUnnamed),rkK(yk.pkg?.regFit)],
    ['','배분가',rkK(yk.pkg?.distUnnamed),rkK(yk.pkg?.distFit)],
    ['','할인율',yk.pkg?.discUnnamed||'—',yk.pkg?.discFit||'—'],
    [],
    ['판매가 [단위:천원]','','회원(무기명)','FIT'],
    ['','정상가',rkK(yk.sell?.unnamed),rkK(yk.sell?.fit)],
    ['','할인율',yk.sell?.discUnnamed||'—',yk.sell?.discFit||'—'],
    [],
    ['수수료',yk.commission||''],
    ['KPI',yk.kpi||'']
  ];
  const ws2=XLSX.utils.aoa_to_sheet(detailRows);
  ws2['!cols']=[{wch:18},{wch:12},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'기획전상세');

  const fname=`품의서_${fd.property||propLabel}_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
  showFormMsg('엑셀 다운로드 완료','success');
  setTimeout(()=>showFormMsg('',''),2000);
}
