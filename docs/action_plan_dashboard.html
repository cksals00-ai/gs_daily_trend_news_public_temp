<style>
:root{--bg:#1a1d23;--bg-card:#252932;--bg-deep:#14171c;--bg-soft:#2d3138;--bg-hover:#353a44;--ink:#f5f5f7;--ink-soft:#e0e0e3;--ink-muted:#a8acb3;--ink-faint:#7a7e85;--gold:#c9a063;--gold-bright:#e6b970;--positive:#4caf6f;--positive-bg:#1f3a28;--warning:#e8a256;--warning-bg:#3d2e1a;--negative:#e57373;--negative-bg:#3d1f1f;--info:#5a9fc4;--info-bg:#1a2e3d;--inbound:#06b6d4;--ota:#8b5cf6;--gota:#f59e0b;--red:#ef4444;--green:#22c55e;--rule:rgba(255,255,255,.12);--rule-strong:rgba(255,255,255,.22);--sans:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,sans-serif;--mono:'JetBrains Mono','Pretendard Variable',Consolas,monospace;--radius:7px}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.65;font-size:15px;font-weight:500;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-x:hidden}
*,*::before,*::after{font-family:inherit}input,button,textarea,select,table,th,td{font-family:var(--sans)!important}

/* GSN */
.gsn{background:#0b0f14;border-bottom:1px solid #1e2530;font-size:13px;position:sticky;top:0;z-index:200}
.gsn-wrap{max-width:1400px;margin:0 auto;padding:0 20px;height:42px;display:flex;align-items:center}
.gsn-brand{color:#7a8794;text-decoration:none;font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap;margin-right:24px;padding-right:24px;border-right:1px solid #1e2530}.gsn-brand:hover{color:#c9d1d9}.gsn-brand-dot{color:#58a6ff}
.gsn-links{display:flex;align-items:center;gap:2px;flex:1}
.gsn-item{color:#7d8590;text-decoration:none;padding:4px 12px;border-radius:6px;white-space:nowrap;font-size:13px;transition:background .15s,color .15s}.gsn-item:hover{background:#1a2232;color:#c9d1d9}.gsn-item.active{background:#1c2d3f;color:#58a6ff;font-weight:600}
.gsn-toggle{display:none;background:none;border:none;color:#7d8590;cursor:pointer;padding:5px;border-radius:4px;margin-left:auto}.gsn-toggle:hover{color:#c9d1d9;background:#1e2530}
@media(max-width:640px){.gsn-links{display:none;flex-direction:column;position:absolute;top:42px;left:0;right:0;background:#0b0f14;border-bottom:1px solid #1e2530;padding:8px 12px;gap:3px;z-index:300}.gsn-links.open{display:flex}.gsn-item{padding:8px 12px}.gsn-item[style*="display:none"]{display:none!important}.gsn-toggle{display:flex;align-items:center;justify-content:center}}

/* Layout */
.mast{background:var(--bg-deep);border-bottom:1px solid var(--rule-strong);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:42px;z-index:190}
.mast-logo{display:flex;align-items:baseline;gap:10px}.mast-name{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:.18em;color:var(--gold-bright)}.mast-sub{font-size:12px;color:var(--ink-muted);font-weight:600}
.nav-btn{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-muted);text-decoration:none;letter-spacing:.1em;padding:6px 11px;border:1px solid var(--rule);border-radius:4px;transition:all .2s;background:transparent}.nav-btn:hover{color:var(--gold);border-color:rgba(201,160,99,.5)}

/* Gantt bars */
.gantt-cell{width:24px;min-width:24px;max-width:24px;padding:0!important;position:relative;border-left:1px solid rgba(255,255,255,.04)}

.gantt-cell .bar{position:absolute;top:25%;height:50%;border-radius:2px;min-width:100%}

/* Today marker */

/* Status dot */

.st-dot.active{background:var(--positive)}.st-dot.upcoming{background:var(--info)}.st-dot.ended{background:var(--ink-faint)}

@media(max-width:900px){.wrap{padding:12px 10px 36px}}
@media(max-width:640px){.mast{padding:0 14px}.mast-sub{display:none}}

<script>
/* ═══════════════════════════════════════════
   주간활동일지 Action Plan — 간트 차트
   구글시트 CSV 자동 연동
   Key번호 시트 → 패키지코드 매칭 → 실적 연동
   ═══════════════════════════════════════════ */

let allRows = [];
let selCh = '전체';
const today = new Date();
const todayStr = today.toISOString().slice(0,10);

const fmt = n => n == null || isNaN(n) ? '—' : Number(n).toLocaleString('ko-KR');

/* ── CSV ── */
function parseCSVLine(line) {
  const r = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (q && line[i+1] === '"') { cur += '"'; i++; } else q = !q; }
    else if (c === ',' && !q) { r.push(cur); cur = ''; }
    else cur += c;
  }
  r.push(cur); return r;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  // 실제 헤더 행 탐색: '사업장' 또는 '채널' 컬럼이 포함된 첫 행
  let hdrIdx = 0;
  for (let i = 0; i < Math.min(lines.length, 30); i++) {
    const cells = parseCSVLine(lines[i]).map(h => h.trim());
    const joined = cells.join(',').toLowerCase();
    if (joined.includes('사업장') || joined.includes('채널')) { hdrIdx = i; break; }
  }
  const hdr = parseCSVLine(lines[hdrIdx]).map(h => h.trim());
  return lines.slice(hdrIdx + 1).map(l => {
    const vals = parseCSVLine(l);
    const row = {};
    hdr.forEach((h, i) => row[h] = (vals[i]||'').trim());
    return row;
  });
}

/* ── Column finder ── */
function findCol(row, ...keys) {
  for (const k of keys) {
    for (const rk of Object.keys(row)) {
      if (rk.toLowerCase().includes(k.toLowerCase())) return row[rk];
    }
  }
  return '';
}

function normCh(ch) {
  if (!ch) return '';
  const u = ch.toUpperCase().replace(/[\s\-_]/g,'');
  if (u.includes('INBOUND') || u.includes('인바운드')) return 'Inbound';
  if (u.includes('GOTA') || u.includes('G-OTA') || u.includes('글로벌') || u.includes('G_OTA')) return 'G-OTA';
  if (u.includes('OTA')) return 'OTA';
  return ch;
}

function parseDate(s) {
  if (!s) return null;
  // Handle various formats: 2026-04-28, 2026.04.28, 04/28/2026, etc.
  const m = s.match(/(\d{4})[\-\.\/](\d{1,2})[\-\.\/](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const m2 = s.match(/(\d{1,2})[\-\.\/](\d{1,2})[\-\.\/](\d{4})/);
  if (m2) return new Date(+m2[3], +m2[1]-1, +m2[2]);
  return null;
}

function mapRow(raw) {
  const startStr = findCol(raw, '판매기간(시작)', '시작일', '판매시작', '기간시작', '시작', 'start');
  const endStr = findCol(raw, '판매기간(종료)', '종료일', '판매종료', '기간종료', '종료', 'end');
  const start = parseDate(startStr);
  const end = parseDate(endStr);
  let status = 'unknown';
  if (start && start > today) status = 'upcoming';
  else if (end && end < today) status = 'ended';
  else if (start) status = 'active';

  return {
    key: findCol(raw, 'Key', 'key', 'KEY', '키', 'No', 'no', '번호'),
    channel: normCh(findCol(raw, '채널', 'channel', '세그')),
    person: findCol(raw, '담당자', '담당', 'person', '작성자'),
    property: findCol(raw, '사업장', '영업장', 'property', '리조트'),
    title: findCol(raw, '기획전', '기획전명', '상품명', '내용', 'title', '프로모션', '제목'),
    startDate: start,
    endDate: end,
    startStr, endStr,
    price: findCol(raw, '판매가', '가격', 'price'),
    packageCode: findCol(raw, '패키지코드', '패키지', 'package', 'code', 'PKG'),
    status,
    _raw: raw
  };
}

/* ── Load ── */
async function loadCSV() {
  const url = document.getElementById('csv-url').value.trim();
  if (!url) return;
  document.getElementById('load-status').textContent = '⏳ 로딩...';
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const txt = await r.text();
    const raw = parseCSV(txt);
    if (!raw.length) throw new Error('빈 데이터');
    allRows = raw.map(mapRow).filter(r => r.title || r.property); // skip empty rows
    document.getElementById('load-status').innerHTML = `✅ ${allRows.length}건 (${new Date().toLocaleTimeString('ko-KR')})`;
    localStorage.setItem('ap_csv_url', url);
    populateFilters();
    render();
  } catch(e) {
    document.getElementById('load-status').textContent = '❌ ' + e.message;
  }
}

function populateFilters() {
  const persons = [...new Set(allRows.map(d => d.person).filter(Boolean))].sort();
  const props = [...new Set(allRows.map(d => d.property).filter(Boolean))].sort();
  const ps = document.getElementById('f-person');
  ps.innerHTML = '<option value="">전체</option>' + persons.map(p => `<option>${p}</option>`).join('');
  const pr = document.getElementById('f-prop');
  pr.innerHTML = '<option value="">전체</option>' + props.map(p => `<option>${p}</option>`).join('');
  buildChChips();
}

function buildChChips() {
  const c = document.getElementById('ch-chips');
  c.innerHTML = ['전체','Inbound','OTA','G-OTA'].map(ch => {
    const cls = ch === 'Inbound' ? 'ch-inbound' : ch === 'OTA' ? 'ch-ota' : ch === 'G-OTA' ? 'ch-gota' : '';
    return `<button class="chip ${cls} ${selCh===ch?'active':''}" onclick="selCh='${ch}';buildChChips();render()">${ch}</button>`;
  }).join('');
}

function getFiltered() {
  return allRows.filter(d => {
    if (selCh !== '전체' && d.channel !== selCh) return false;
    const p = document.getElementById('f-person').value;
    if (p && d.person !== p) return false;
    const pr = document.getElementById('f-prop').value;
    if (pr && d.property !== pr) return false;
    return true;
  });
}

/* ── Gantt Date Range ── */
function getDateRange(data) {
  // Find min start and max end, then pad
  let minD = new Date(today); minD.setDate(minD.getDate() - 14);
  let maxD = new Date(today); maxD.setDate(maxD.getDate() + 60);

  data.forEach(d => {
    if (d.startDate && d.startDate < minD) minD = new Date(d.startDate);
    if (d.endDate && d.endDate > maxD) maxD = new Date(d.endDate);
  });

  // Align to Monday
  const dayOfWeek = minD.getDay();
  minD.setDate(minD.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  // Extend to Sunday
  maxD.setDate(maxD.getDate() + (7 - maxD.getDay()) % 7);

  const days = [];
  const cur = new Date(minD);
  while (cur <= maxD) {
    days.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

/* ── Render ── */
function render() {
  const data = getFiltered();
  document.getElementById('count-label').textContent = `${data.length}건 / ${allRows.length}건`;

  if (!data.length) {
    document.getElementById('gantt-wrap').innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-faint)">표시할 데이터가 없습니다</div>';
    return;
  }

  // Sort: active first, then upcoming, then ended, within each by start date
  const order = {active:0, upcoming:1, ended:2, unknown:3};
  data.sort((a,b) => {
    const s = (order[a.status]||3) - (order[b.status]||3);
    if (s !== 0) return s;
    if (a.startDate && b.startDate) return a.startDate - b.startDate;
    return 0;
  });

  const days = getDateRange(data);
  const todayIdx = days.findIndex(d => d.toISOString().slice(0,10) === todayStr);

  // Build month headers
  const months = {};
  days.forEach((d, i) => {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = {start: i, count: 0, label: `${d.getFullYear()}년 ${d.getMonth()+1}월`};
    months[key].count++;
  });

  // Build HTML
  let html = '<table class="gantt-table">';

  // Month header row
  html += '<tr>';
  html += '<th class="freeze" colspan="9" style="text-align:left;border-right:2px solid var(--rule-strong)">기획전 정보</th>';
  Object.values(months).forEach(m => {
    const bgColors = ['rgba(59,130,246,.08)','rgba(245,158,11,.06)','rgba(76,175,111,.06)','rgba(168,146,200,.06)'];
    const idx = Object.keys(months).indexOf(Object.keys(months).find(k => months[k] === m));
    html += `<th colspan="${m.count}" style="background:${bgColors[idx%bgColors.length]};font-size:11px;color:var(--ink-soft);font-weight:800">${m.label}</th>`;
  });
  html += '</tr>';

  // Day header row
  html += '<tr>';
  html += '<th class="freeze" style="border-right:1px solid var(--rule)">No</th>';
  html += '<th style="border-right:1px solid var(--rule)">채널</th>';
  html += '<th style="border-right:1px solid var(--rule)">담당</th>';
  html += '<th style="border-right:1px solid var(--rule)">사업장</th>';
  html += '<th style="border-right:1px solid var(--rule);text-align:left">기획전명</th>';
  html += '<th style="border-right:1px solid var(--rule)">시작</th>';
  html += '<th style="border-right:1px solid var(--rule)">종료</th>';
  html += '<th style="border-right:1px solid var(--rule)">판매가</th>';
  html += '<th style="border-right:2px solid var(--rule-strong)">PKG</th>';
  days.forEach((d, i) => {
    const dow = d.getDay();
    const isWe = dow === 0 || dow === 6;
    const isToday = d.toISOString().slice(0,10) === todayStr;
    const dayNum = d.getDate();
    const color = isToday ? 'var(--red)' : isWe ? 'rgba(229,115,115,.6)' : 'var(--ink-faint)';
    const bg = isToday ? 'rgba(239,68,68,.12)' : isWe ? 'rgba(255,255,255,.03)' : '';
    html += `<th class="gantt-cell" style="color:${color};${bg?'background:'+bg+';':''}font-size:8px;padding:2px 0!important">${dayNum}</th>`;
  });
  html += '</tr>';

  // Data rows
  data.forEach((d, rowIdx) => {
    const chCls = d.channel === 'Inbound' ? 'inbound' : d.channel === 'OTA' ? 'ota' : d.channel === 'G-OTA' ? 'gota' : '';
    const barCls = d.channel === 'Inbound' ? 'bar-inbound' : d.channel === 'OTA' ? 'bar-ota' : d.channel === 'G-OTA' ? 'bar-gota' : 'bar-default';
    const stDot = d.status === 'active' ? 'active' : d.status === 'upcoming' ? 'upcoming' : 'ended';

    html += '<tr>';
    html += `<td class="freeze col-no" style="border-right:1px solid var(--rule)"><span class="st-dot ${stDot}"></span>${d.key || (rowIdx+1)}</td>`;
    html += `<td class="col-ch" style="border-right:1px solid var(--rule)"><span class="ch-badge ${chCls}">${d.channel||'—'}</span></td>`;
    html += `<td class="col-person" style="border-right:1px solid var(--rule)">${d.person||'—'}</td>`;
    html += `<td class="col-prop" style="border-right:1px solid var(--rule)">${d.property||'—'}</td>`;
    html += `<td class="col-title" style="border-right:1px solid var(--rule)">${d.title||'—'}</td>`;
    html += `<td class="col-period" style="border-right:1px solid var(--rule)">${d.startStr ? d.startStr.replace(/^\d{4}[\-\.]/, '') : '—'}</td>`;
    html += `<td class="col-period" style="border-right:1px solid var(--rule)">${d.endStr ? d.endStr.replace(/^\d{4}[\-\.]/, '') : '—'}</td>`;

    const priceNum = d.price ? parseInt(d.price.replace(/[^0-9]/g,'')) : null;
    html += `<td class="col-price" style="border-right:1px solid var(--rule)">${priceNum ? fmt(priceNum) : '—'}</td>`;
    html += `<td class="col-pkg" style="border-right:2px solid var(--rule-strong)">${d.packageCode||'—'}</td>`;

    // Gantt bar cells
    days.forEach((day, dayIdx) => {
      const isWe = day.getDay() === 0 || day.getDay() === 6;
      const isToday = day.toISOString().slice(0,10) === todayStr;
      const dayStart = new Date(day); dayStart.setHours(0,0,0,0);

      let hasBar = false;
      if (d.startDate && d.endDate) {
        const s = new Date(d.startDate); s.setHours(0,0,0,0);
        const e = new Date(d.endDate); e.setHours(23,59,59,999);
        hasBar = dayStart >= s && dayStart <= e;
      }

      const bgCls = isToday ? 'background:rgba(239,68,68,.08);' : isWe ? 'background:rgba(255,255,255,.02);' : '';
      html += `<td class="gantt-cell" style="${bgCls}">`;
      if (hasBar) html += `<div class="bar ${barCls}"></div>`;
      html += '</td>';
    });

    html += '</tr>';
  });

  html += '</table>';
  document.getElementById('gantt-wrap').innerHTML = html;

  // Scroll to today
  if (todayIdx > 0) {
    const wrap = document.getElementById('gantt-wrap');
    // Each gantt cell is ~24px, info columns ~600px
    setTimeout(() => {
      const targetX = 600 + (todayIdx - 5) * 24;
      wrap.scrollLeft = Math.max(0, targetX);
    }, 100);
  }
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  buildChChips();
  const saved = localStorage.getItem('ap_csv_url');
  if (saved) document.getElementById('csv-url').value = saved;
  // Auto-load
  loadCSV();
});
</script>
