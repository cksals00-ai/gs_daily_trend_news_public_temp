<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>전략 키인 · GS 2026 여름 운영전략</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d23;
  --bg-deep: #0d1117;
  --bg-soft: #22272e;
  --bg-hover: #2d333b;
  --ink: #e8e6e1;
  --ink-soft: #d4d2c8;
  --ink-muted: #9e9b93;
  --ink-faint: #6e6c62;
  --gold: #c9a063;
  --gold-bright: #e6b970;
  --gold-dim: rgba(201,160,99,0.15);
  --positive: #4caf6f;
  --positive-bg: #1f3a28;
  --warning: #e8a256;
  --warning-bg: #3d2e1a;
  --negative: #e57373;
  --negative-bg: #3d1f1f;
  --info: #5a9fc4;
  --info-bg: #1a2e3d;
  --rule: rgba(255,255,255,0.08);
  --rule-strong: rgba(255,255,255,0.18);
  --sans: 'Pretendard Variable', Pretendard, 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Pretendard Variable', Consolas, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:14px;font-weight:500;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;overflow-x:hidden;word-break:keep-all}

/* ===== MASTHEAD ===== */
.masthead{background:var(--bg-deep);border-bottom:1px solid var(--rule-strong);padding:12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.mast-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:.18em;color:var(--gold-bright)}
.mast-title{font-size:14px;color:var(--ink-soft);font-weight:600}
.mast-left{display:flex;align-items:center;gap:14px}
.mast-right{display:flex;gap:8px;align-items:center}
.mast-ts{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-right:8px}

/* ===== BUTTONS ===== */
.btn{padding:7px 16px;border:1px solid var(--rule-strong);background:transparent;color:var(--ink-muted);font-weight:600;font-size:12px;border-radius:4px;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.btn:hover{color:var(--ink);border-color:var(--gold);background:var(--gold-dim)}
.btn-gold{background:var(--gold);color:var(--bg-deep);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-bright)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-positive{border-color:var(--positive);color:var(--positive)}
.btn-positive:hover{background:var(--positive-bg)}
.btn-negative{border-color:var(--negative);color:var(--negative)}
.btn-negative:hover{background:var(--negative-bg)}
.btn-warning{border-color:var(--warning);color:var(--warning)}
.btn-warning:hover{background:var(--warning-bg)}

/* ===== LAYOUT ===== */
.content{max-width:1400px;margin:0 auto;padding:20px 24px 60px}

/* ===== MONTH TABS ===== */
.month-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-soft);padding:4px;border-radius:8px;width:fit-content}
.month-tab{padding:8px 28px;border:none;background:transparent;color:var(--ink-muted);font-weight:600;font-size:13px;cursor:pointer;border-radius:6px;transition:all .2s;font-family:var(--sans)}
.month-tab:hover{color:var(--ink)}
.month-tab.active{background:var(--bg-card);color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.month-panel{display:none}
.month-panel.active{display:block}

/* ===== CYCLE SUB-TABS ===== */
.cycle-tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--rule);padding-bottom:0}
.cycle-tab{padding:10px 18px;border:none;background:transparent;color:var(--ink-faint);font-weight:600;font-size:12.5px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;font-family:var(--sans);letter-spacing:.02em}
.cycle-tab:hover{color:var(--ink-muted)}
.cycle-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.cycle-panel{display:none}
.cycle-panel.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== PILL TOGGLES ===== */
.pills{display:flex;gap:4px;margin-bottom:16px;background:var(--bg-soft);padding:3px;border-radius:6px;width:fit-content}
.pill{padding:6px 14px;border:none;background:transparent;color:var(--ink-muted);font-weight:500;font-size:12px;cursor:pointer;border-radius:4px;transition:all .2s;font-family:var(--sans)}
.pill.active{background:var(--bg-card);color:var(--gold)}
.pill-panel{display:none}
.pill-panel.active{display:block}

/* ===== TABLES ===== */
.tbl-wrap{overflow-x:auto;margin-bottom:16px;border-radius:8px;border:1px solid var(--rule)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--bg-soft);padding:8px 10px;font-weight:600;color:var(--ink-muted);text-align:right;border-bottom:1px solid var(--rule-strong);white-space:nowrap;font-size:11px;letter-spacing:.03em;text-transform:uppercase}
th:first-child{text-align:left}
td{padding:7px 10px;border-bottom:1px solid var(--rule);text-align:right;font-family:var(--mono);font-size:12px;white-space:nowrap}
td:first-child{text-align:left;font-family:var(--sans);font-weight:500;color:var(--ink-soft)}
tr:hover{background:var(--bg-hover)}
tr.seg-header{background:var(--bg-soft)}
tr.seg-header td{font-weight:700;color:var(--gold);font-family:var(--sans);font-size:12px;border-top:2px solid var(--rule-strong)}
tr.total-row{background:rgba(201,160,99,.06)}
tr.total-row td{font-weight:700;color:var(--ink);border-top:2px solid var(--gold);font-size:12.5px}
.text-positive{color:var(--positive)}
.text-negative{color:var(--negative)}
.text-warning{color:var(--warning)}
.text-gold{color:var(--gold)}
.text-muted{color:var(--ink-faint)}

/* ===== EDITABLE INPUTS ===== */
.keyin-input{width:80px;padding:4px 6px;background:rgba(201,160,99,.08);border:1px solid rgba(201,160,99,.3);border-radius:3px;color:var(--gold-bright);font-family:var(--mono);font-size:12px;text-align:right;outline:none;transition:all .2s}
.keyin-input:focus{border-color:var(--gold);background:rgba(201,160,99,.15);box-shadow:0 0 0 2px rgba(201,160,99,.2)}
.keyin-input::placeholder{color:var(--ink-faint)}
.keyin-input.modified{border-color:var(--info);color:var(--info);background:rgba(90,159,196,.1)}
.keyin-cell{position:relative}
.ai-reason{display:block;font-family:var(--sans);font-size:10px;color:var(--ink-faint);line-height:1.3;margin-top:3px;white-space:normal;max-width:160px}
.ai-reason em{color:var(--gold);font-style:normal;font-weight:600}
.ai-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(201,160,99,.12);color:var(--gold);font-weight:600;margin-left:4px;vertical-align:middle}
.ai-tag.user-edit{background:rgba(90,159,196,.12);color:var(--info)}
.reset-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
.reset-bar .info-text{font-size:11px;color:var(--ink-muted)}

/* ===== SECTION HEADERS ===== */
.sec-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-subtitle{font-size:12px;color:var(--ink-muted);margin-bottom:12px}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:.04em}

/* ===== VALIDATION ALERT ===== */
.valid-bar{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.valid-ok{background:var(--positive-bg);color:var(--positive);border:1px solid rgba(76,175,111,.2)}
.valid-warn{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(232,162,86,.2)}
.valid-err{background:var(--negative-bg);color:var(--negative);border:1px solid rgba(229,115,115,.2)}

/* ===== CHARTS ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{background:var(--bg-card);border:1px solid var(--rule);border-radius:8px;padding:16px;min-height:280px}
.chart-title{font-size:12px;font-weight:600;color:var(--ink-muted);margin-bottom:12px;letter-spacing:.02em}
.chart-container{position:relative;height:240px}

/* ===== RISK CARDS ===== */
.risk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:16px}
.risk-card{background:var(--bg-card);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;transition:all .2s}
.risk-card:hover{border-color:var(--rule-strong);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.risk-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.risk-title{font-weight:600;font-size:13px;color:var(--ink)}
.risk-badge{font-size:10px;padding:2px 10px;border-radius:10px;font-weight:700}
.badge-ok{background:var(--positive-bg);color:var(--positive)}
.badge-warn{background:var(--warning-bg);color:var(--warning)}
.badge-danger{background:var(--negative-bg);color:var(--negative)}
.risk-body{font-size:12px;color:var(--ink-muted);line-height:1.5}
.risk-metric{font-family:var(--mono);font-size:18px;font-weight:700;margin:6px 0}

/* ===== AI STRATEGY CARDS ===== */
.ai-section{margin-bottom:24px}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ai-card{background:var(--bg-card);border:1px solid var(--rule);border-radius:8px;overflow:hidden;transition:all .3s}
.ai-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(201,160,99,.1)}
.ai-card.applied{border-color:var(--positive);background:rgba(76,175,111,.03)}
.ai-card.applied .ai-card-hdr{background:var(--positive-bg)}
.ai-card.rejected{border-color:var(--ink-faint);opacity:.5}
.ai-card.rejected .ai-card-hdr{background:var(--bg-hover)}
.ai-card.modified{border-color:var(--info);background:rgba(90,159,196,.03)}
.ai-card.modified .ai-card-hdr{background:var(--info-bg)}
.ai-card-hdr{padding:10px 14px;background:var(--bg-soft);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--rule)}
.ai-card-name{font-weight:700;font-size:13px;color:var(--ink)}
.ai-priority{font-size:10px;padding:2px 10px;border-radius:10px;font-weight:800;letter-spacing:.06em}
.ai-priority-s{background:linear-gradient(135deg,#c9a063,#e6b970);color:var(--bg-deep)}
.ai-priority-a{background:var(--info-bg);color:var(--info)}
.ai-priority-b{background:var(--bg-hover);color:var(--ink-muted)}
.ai-card-body{padding:14px}
.ai-row{margin-bottom:10px}
.ai-row:last-child{margin-bottom:0}
.ai-label{font-size:10.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;margin-bottom:3px;text-transform:uppercase}
.ai-text{font-size:12px;color:var(--ink-soft);line-height:1.5}
.ai-highlight{font-family:var(--mono);font-weight:700;color:var(--gold-bright)}
.ai-effect-box{background:rgba(201,160,99,.06);border:1px solid rgba(201,160,99,.15);border-radius:6px;padding:10px 12px;margin:8px 0}
.ai-effect-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ai-effect-row:last-child{margin-bottom:0}
.ai-effect-label{font-size:11px;color:var(--ink-muted)}
.ai-effect-value{font-family:var(--mono);font-size:13px;font-weight:700}
.ai-impact-bar{height:6px;background:var(--bg-hover);border-radius:3px;margin-top:6px;overflow:hidden}
.ai-impact-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--positive))}
.ai-card-foot{padding:10px 14px;border-top:1px solid var(--rule);display:flex;gap:6px}
.ai-card-foot .btn{flex:1;text-align:center}
.ai-status-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;margin-left:8px}
.tag-applied{background:var(--positive-bg);color:var(--positive)}
.tag-modified{background:var(--info-bg);color:var(--info)}
.tag-rejected{background:var(--negative-bg);color:var(--negative)}

/* ===== ACTION LOG ===== */
.log-section{margin-top:20px}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;background:var(--positive);color:#fff;padding:10px 20px;border-radius:6px;font-weight:600;font-size:12px;z-index:999;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){.charts-grid,.ai-grid{grid-template-columns:1fr}.risk-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.mast-inner{flex-direction:column;align-items:flex-start}.content{padding:12px 12px 40px}.cycle-tabs{overflow-x:auto;flex-wrap:nowrap}.risk-grid{grid-template-columns:1fr}th,td{padding:6px 7px;font-size:11px}.keyin-input{width:65px}}
</style>
</head>
<body>

<!-- ======== MASTHEAD ======== -->
<div class="masthead">
  <div class="mast-inner">
    <div class="mast-left">
      <span class="logo">GS HOTELS</span>
      <span class="mast-title">전략 키인 · 2026 여름</span>
    </div>

      <span class="mast-ts" id="lastSaved"></span>
      <button class="btn" onclick="saveData()">💾 저장</button>

</div>

<!-- ======== MAIN CONTENT ======== -->
<div class="content">

  <div class="month-tabs" id="monthTabs"></div>

  <!-- Month Panels (generated by JS) -->
  <div id="monthPanels"></div>
</div>

<script>
// ============================================================

// ============================================================
const MONTHS = ['2026-06','2026-07','2026-08'];

const PRODUCTS_SAMPLE = [

  '익스피디아':{rn:5400,adr:210},'부킹닷컴':{rn:3600,adr:220},
  '여행사(합산)':{rn:4200,adr:160}
};

// Channel TY actual (simulated current — partial month progress)
const CH_TY = {
  '야놀자':{rn:12400},'여기어때':{rn:9800},'네이버':{rn:3100},'쿠팡':{rn:5600},
  '스마트인피니':{rn:4800},'종이비행기':{rn:900},'프리즘':{rn:650},

// AI 제안값 캐시 (초기화용)
const AI_SUGGEST_CACHE = {};

function calcAISuggest(ch, month) {
  const cacheKey = `${ch}|${month}`;
  if (AI_SUGGEST_CACHE[cacheKey]) return AI_SUGGEST_CACHE[cacheKey];

  const lyBase = CH_LY[ch]?.rn || 0;
  const m = MONTH_MULT[month];
  const lyMonthly = Math.round(lyBase * m);
  const rate = CH_YOY_RATES[ch]?.yoy || 0;
  const note = CH_YOY_RATES[ch]?.note || '';

  // 전략적 보정: 급감 채널은 감소폭의 50%만 반영 (최소 실적 보장)
  // 급성장 채널은 성장폭의 80% 반영 (과도한 기대 방지)
  let adjustedRate = rate;
  if (rate < -20) adjustedRate = rate * 0.5;      // 급감 채널 보수적
  else if (rate > 50) adjustedRate = rate * 0.8;   // 급성장 채널 현실적
  else if (rate > 20) adjustedRate = rate * 0.9;   // 성장 채널 소폭 보수적

  const suggested = Math.round(lyMonthly * (1 + adjustedRate/100));

  let reason = `전년 ${fmt(lyMonthly)}실`;
  if (Math.abs(rate) < 0.1) {
    reason += ' × 전년 수준 유지';
  } else if (rate !== adjustedRate) {
    reason += ` × YoY <em>${rate>0?'+':''}${fmtDec(rate,1)}%</em>`;
    reason += ` (전략보정 → <em>${adjustedRate>0?'+':''}${fmtDec(adjustedRate,1)}%</em>)`;
  } else {
    reason += ` × YoY <em>${rate>0?'+':''}${fmtDec(rate,1)}%</em>`;
  }
  reason += ` = <em>${fmt(suggested)}실</em>`;

  const result = {value: suggested, reason, note, lyMonthly, yoyRate: rate, adjustedRate};
  AI_SUGGEST_CACHE[cacheKey] = result;
  return result;
}

// AI 제안 세그먼트 합산 (Tab1 자동 채움용)
function calcAISegTarget(seg, month) {
  const channels = SEG_CHANNELS[seg];
  let totalRN = 0;
  channels.forEach(ch => { totalRN += calcAISuggest(ch, month).value; });
  return totalRN;
}

function getEffectiveTarget(ch, month) {
  // 사용자가 수정한 값이 있으면 그걸 쓰고, 없으면 AI 제안값
  const userVal = keyinData[month].channels[ch]?.target_rn;
  const ai = calcAISuggest(ch, month);
  const isUserModified = userVal !== undefined && userVal !== ai.value;
  return {
    value: userVal !== undefined ? userVal : ai.value,
    aiValue: ai.value,
    isUserModified,
    reason: ai.reason,
    note: ai.note
  };
}

function resetAISuggestions(month) {
  // 모든 채널의 사용자 수정값을 지우고 AI 제안으로 복원
  Object.keys(SEG_CHANNELS).forEach(seg => {
    SEG_CHANNELS[seg].forEach(ch => {
      if (keyinData[month].channels[ch]) {
        delete keyinData[month].channels[ch].target_rn;
      }
    });
  });
  // 세그먼트 목표도 AI 제안 합산으로 복원
  ALL_SEGS.forEach(seg => {
    if (keyinData[month].segments[seg]) {
      delete keyinData[month].segments[seg].rn;
    }
  });
  renderChannelTable(month);
  renderTab1(month);
  showToast('AI 제안값으로 초기화되었습니다');
}

function renderChannelTable(month) {
  const el = document.getElementById(`pill-channel-${month}`);
  const segData = getSegData(month);
  const m = MONTH_MULT[month];

  // Compute totals first for validation
  let totalAI = 0, totalUser = 0, totalBudget = 0;
  let modifiedCount = 0;
  ALL_SEGS.forEach(seg => {
    SEG_CHANNELS[seg].forEach(ch => {
      const eff = getEffectiveTarget(ch, month);
      totalUser += eff.value;
      totalAI += eff.aiValue;
      if (eff.isUserModified) modifiedCount++;
    });
    totalBudget += segData[seg]?.budget_rn || 0;
  });

  // Validation: total keyin vs budget
  let validHtml = '';
  const budgetDiff = totalUser - totalBudget;
  const budgetDiffPct = totalBudget>0 ? (budgetDiff/totalBudget*100) : 0;
  if (Math.abs(budgetDiff) > totalBudget * 0.02) {
    validHtml += `<div class="valid-bar ${budgetDiff<0?'valid-warn':'valid-ok'}">
      ${budgetDiff<0?'⚠':'✓'} 거래처 합계 <strong>${fmt(totalUser)}실</strong> vs 사업계획 <strong>${fmt(totalBudget)}실</strong>
      (차이: <strong>${budgetDiff>0?'+':''}${fmt(budgetDiff)}실, ${fmtPct(budgetDiffPct)}</strong>)
      ${budgetDiff<0?' — 기획전/오버부킹 등 추가 전략으로 갭 보전 필요':''}
    </div>`;
  } else {
    validHtml += `<div class="valid-bar valid-ok">✓ 거래처 합계 <strong>${fmt(totalUser)}실</strong> ≈ 사업계획 <strong>${fmt(totalBudget)}실</strong> — 일치</div>`;
  }

  // Per-segment validation
  ALL_SEGS.forEach(seg => {
    const segTarget = keyinData[month].segments[seg]?.rn || calcAISegTarget(seg, month);
    let chSum = 0;
    SEG_CHANNELS[seg].forEach(ch => { chSum += getEffectiveTarget(ch, month).value; });
    if (Math.abs(chSum - segTarget) > segTarget * 0.01 && segTarget > 0) {
      const diff = chSum - segTarget;
      validHtml += `<div class="valid-bar valid-warn" style="font-size:11px;padding:5px 12px">↳ ${seg}: 거래처 합 ${fmt(chSum)} vs 세그 목표 ${fmt(segTarget)} (${diff>0?'+':''}${fmt(diff)})</div>`;
    }
  });

  let html = `<div class="reset-bar">
    <div class="info-text">
      🤖 AI가 전년 실적 × YoY 트렌드 기반으로 목표를 자동 산출했습니다.
      ${modifiedCount>0?`<span style="color:var(--info)">수정된 항목: ${modifiedCount}건</span>`:'수정이 필요한 항목을 직접 편집하세요.'}
    </div>
    <button class="btn btn-sm" onclick="resetAISuggestions('${month}')">🔄 AI 제안 초기화</button>
  </div>`;
  html += validHtml;
  html += `<div class="sec-subtitle">거래처별 목표(AI 제안 → 수정 가능) / 실적 / 달성률 / 전년 / 전년비</div>`;
  html += `<div class="tbl-wrap"><table>
  <thead><tr><th style="min-width:120px">거래처</th><th style="min-width:200px">목표 RN <span class="ai-tag">AI 제안</span></th><th>실적 RN</th><th>달성률</th><th>전년 RN</th><th>전년비</th></tr></thead><tbody>`;

  let grandTarget=0, grandActual=0, grandLY=0;

  ALL_SEGS.forEach(seg => {
    // Segment AI total
    const segAITotal = calcAISegTarget(seg, month);
    const segBudget = segData[seg]?.budget_rn || 0;
    html += `<tr class="seg-header"><td colspan="6">${seg} 세그먼트 <span style="font-weight:400;font-size:11px;color:var(--ink-muted);margin-left:8px">AI 세그합: ${fmt(segAITotal)} / 사업계획: ${fmt(segBudget)}</span></td></tr>`;
    let segTargetSum=0, segActualSum=0, segLYSum=0;

    SEG_CHANNELS[seg].forEach(ch => {
      const ly = Math.round((CH_LY[ch]?.rn||0) * m);
      const ty = Math.round((CH_TY[ch]?.rn||0) * m);
      const eff = getEffectiveTarget(ch, month);
      const target = eff.value;
      const ach = target>0 ? (ty/target*100) : 0;
      const yoy = ly>0 ? ((ty-ly)/ly*100) : 0;

      segTargetSum += target;
      segActualSum += ty;
      segLYSum += ly;

      const inputCls = eff.isUserModified ? 'keyin-input modified' : 'keyin-input';
      const tag = eff.isUserModified ? '<span class="ai-tag user-edit">수정됨</span>' : '';

      html += `<tr>
        <td style="padding-left:20px">${ch}</td>
        <td class="keyin-cell">
          <input class="${inputCls}" data-month="${month}" data-ch="${ch}" value="${fmt(target)}" title="${eff.note}">
          ${tag}
          <span class="ai-reason">${eff.reason}</span>
        </td>
        <td>${fmt(ty)}</td>
        <td class="${pctClass(ach-100)}">${fmtDec(ach,1)}%</td>
        <td>${fmt(ly)}</td>
        <td class="${pctClass(yoy)}">${fmtPct(yoy)}</td>
      </tr>`;
    });

    // Segment subtotal
    const segAch = segTargetSum>0?(segActualSum/segTargetSum*100):0;
    const segYoy = segLYSum>0?((segActualSum-segLYSum)/segLYSum*100):0;
    html += `<tr class="seg-header"><td style="padding-left:10px">${seg} 소계</td>
      <td>${fmt(segTargetSum)}</td><td>${fmt(segActualSum)}</td>
      <td class="${pctClass(segAch-100)}">${fmtDec(segAch,1)}%</td>
      <td>${fmt(segLYSum)}</td><td class="${pctClass(segYoy)}">${fmtPct(segYoy)}</td></tr>`;

    grandTarget+=segTargetSum; grandActual+=segActualSum; grandLY+=segLYSum;
  });

  const gAch = grandTarget>0?(grandActual/grandTarget*100):0;
  const gYoy = grandLY>0?((grandActual-grandLY)/grandLY*100):0;
  html += `<tr class="total-row"><td>전체 합계</td>
    <td>${fmt(grandTarget)}</td><td>${fmt(grandActual)}</td>
    <td class="${pctClass(gAch-100)}">${fmtDec(gAch,1)}%</td>
    <td>${fmt(grandLY)}</td><td class="${pctClass(gYoy)}">${fmtPct(gYoy)}</td></tr>`;

  html += '</tbody></table></div>';
  el.innerHTML = html;

  // Input handlers — on change, save user's modification
  el.querySelectorAll('.keyin-input').forEach(inp => {
    inp.addEventListener('change', e => {
      const ch = e.target.dataset.ch;
      const val = parseInt(e.target.value.replace(/,/g,'')) || 0;
      if (!keyinData[month].channels[ch]) keyinData[month].channels[ch] = {};
      keyinData[month].channels[ch].target_rn = val;
      e.target.value = fmt(val);
      renderChannelTable(month);
    });
    // Format on blur
    inp.addEventListener('blur', e => {
      const val = parseInt(e.target.value.replace(/,/g,'')) || 0;
      if (val) e.target.value = fmt(val);
    });
  });
}

function renderTab3(month) {
  const el = document.getElementById(`cp-${month}-2`);
  const m = MONTH_MULT[month];
  const mLabel = MONTH_LABELS[month];

  el.innerHTML = `
    <div class="sec-title">진행 Follow-up</div>
    <div class="charts-grid">
      <div class="chart-box">
        <div class="chart-title">OTB 누적 진행률 · ${mLabel}</div>
        <div class="chart-container"><canvas id="chartOTB-${month}"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">FCST 갭 추이 · ${mLabel}</div>
        <div class="chart-container"><canvas id="chartGap-${month}"></canvas></div>
      </div>
    </div>
    <div id="alertBox-${month}"></div>
  `;

  // Chart 1: OTB Progress
  const budgetTotal = Math.round(214269 * MONTH_MULT[month]);
  const days = 30;
  const budgetPace = Array.from({length:days},(_,i)=>Math.round(budgetTotal*(i+1)/days));
  const actualData = [];
  let cum = 0;
  for (let i=0;i<days;i++) {
    const dailyTarget = budgetTotal/days;
    const factor = 0.55 + Math.random()*0.35 + (i>20?0.15:0);
    cum += Math.round(dailyTarget * factor);
    actualData.push(Math.min(cum, Math.round(budgetTotal*0.82)));
  }

  const ctxOTB = document.getElementById(`chartOTB-${month}`).getContext('2d');
  if (chartInstances[`otb-${month}`]) chartInstances[`otb-${month}`].destroy();
  chartInstances[`otb-${month}`] = new Chart(ctxOTB, {
    type:'line',
    data:{
      labels:Array.from({length:days},(_,i)=>`${i+1}일`),
      datasets:[
        {label:'Budget Pace',data:budgetPace,borderColor:'rgba(201,160,99,0.5)',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false},
        {label:'실적 누적',data:actualData,borderColor:'#4caf6f',borderWidth:2,pointRadius:0,fill:{target:'origin',above:'rgba(76,175,111,0.06)'}}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9e9b93',font:{size:11}}}},
      scales:{
        y:{ticks:{color:'#6e6c62',callback:v=>fmt(v)},grid:{color:'rgba(255,255,255,0.04)'}},
        x:{ticks:{color:'#6e6c62',maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });

  // Chart 2: FCST Gap
  const gaps = FCST_GAPS_JUNE.map(g => ({
    date: g.date,
    gap: Math.round(g.gap * MONTH_MULT[month])
  }));

  const ctxGap = document.getElementById(`chartGap-${month}`).getContext('2d');
  if (chartInstances[`gap-${month}`]) chartInstances[`gap-${month}`].destroy();
  chartInstances[`gap-${month}`] = new Chart(ctxGap, {
    type:'bar',
    data:{
      labels:gaps.map(g=>g.date),
      datasets:[{
        label:'FCST 갭 (실)',
        data:gaps.map(g=>g.gap),
        backgroundColor:gaps.map((_,i)=>i===gaps.length-1?'rgba(229,115,115,0.7)':'rgba(232,162,86,0.5)'),
        borderColor:gaps.map((_,i)=>i===gaps.length-1?'#e57373':'#e8a256'),
        borderWidth:1,borderRadius:4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9e9b93',font:{size:11}}}},
      scales:{
        y:{ticks:{color:'#6e6c62',callback:v=>fmt(v)},grid:{color:'rgba(255,255,255,0.04)'}},
        x:{ticks:{color:'#6e6c62'},grid:{display:false}}
      }
    }
  });

  // Alert
  const latestGap = gaps[gaps.length-1].gap;
  const prevGap = gaps.length>1 ? gaps[gaps.length-2].gap : 0;
  if (latestGap > prevGap) {
    document.getElementById(`alertBox-${month}`).innerHTML = `
      <div class="valid-bar valid-err" style="margin-top:12px">
        ⚠ <strong>FCST 갭 확대 중</strong> — 최신 갭 ${fmt(latestGap)}실 (이전 ${fmt(prevGap)}실 대비 +${fmt(latestGap-prevGap)}실 확대). 기획전 추가 검토 필요.
      </div>`;
  }
}

function renderTab5(month) {
  const el = document.getElementById(`cp-${month}-4`);
  const strategies = getAIStrategies(month);

  let html = `
    <div class="sec-title">AI 전략 제안 · ${MONTH_LABELS[month]}</div>
    <div class="sec-subtitle">deep_analysis 데이터 기반 자동 도출 — 문제 진단 → 전략 액션 → 실행 조건 → 예상 효과 → 목표 임팩트</div>
    <div class="ai-grid">
  `;

  strategies.forEach(s => {
    const state = keyinData[month].strategyStates[s.id] || '';
    const stateCls = state==='applied'?'applied':state==='rejected'?'rejected':state==='modified'?'modified':'';
    const stateTag = state==='applied'?'<span class="ai-status-tag tag-applied">적용됨</span>':
                     state==='rejected'?'<span class="ai-status-tag tag-rejected">반려됨</span>':
                     state==='modified'?'<span class="ai-status-tag tag-modified">수정됨</span>':'';

    html += `
    <div class="ai-card ${stateCls}" id="card-${month}-${s.id}">
      <div class="ai-card-hdr">
        <span class="ai-card-name">${s.name}${stateTag}</span>
        <span class="ai-priority ai-priority-${s.priority.toLowerCase()}">${s.priority}등급</span>
      </div>
      <div class="ai-card-body">
        <div class="ai-row">
          <div class="ai-label">📊 문제 진단</div>
          <div class="ai-text">${s.problem}</div>
        </div>
        <div class="ai-row">
          <div class="ai-label">🎯 전략 액션</div>
          <div class="ai-text">${s.action}</div>
        </div>
        <div class="ai-row">
          <div class="ai-label">📅 실행 조건</div>
          <div class="ai-text">${s.conditions}</div>
        </div>
        <div class="ai-effect-box">
          <div class="ai-effect-row">
            <span class="ai-effect-label">예상 추가 RN</span>
            <span class="ai-effect-value ${s.effectRN>=0?'text-positive':'text-negative'}">${s.effectRN>=0?'+':''}${fmt(s.effectRN)}실</span>
          </div>
          <div class="ai-effect-row">
            <span class="ai-effect-label">예상 추가 REV</span>
            <span class="ai-effect-value text-positive">+${fmt(s.effectREV)}백만원</span>
          </div>
          <div class="ai-effect-row">
            <span class="ai-effect-label">비용/ROI</span>
            <span class="ai-effect-value text-gold">${s.effectDetail.split(',').pop().trim()}</span>
          </div>
        </div>
        <div class="ai-row">
          <div class="ai-label">📈 목표 달성 임팩트</div>
          <div class="ai-text">${s.impactText}</div>
          <div class="ai-impact-bar"><div class="ai-impact-fill" style="width:${Math.min(s.impactPct,100)}%"></div></div>
        </div>
      </div>
      <div class="ai-card-foot">
        <button class="btn btn-sm btn-positive" onclick="setStrategy('${month}','${s.id}','applied','${s.name}')">✓ 적용</button>
        <button class="btn btn-sm btn-warning" onclick="modifyStrategy('${month}','${s.id}','${s.name}')">✎ 수정</button>
        <button class="btn btn-sm btn-negative" onclick="setStrategy('${month}','${s.id}','rejected','${s.name}')">✕ 반려</button>
      </div>
    </div>`;
  });

  html += `</div>`;

  // Action Log section
  html += `
    <div class="log-section">
      <div class="sec-title" style="margin-top:28px">액션 이력</div>
      <div class="tbl-wrap">
        <table id="logTable-${month}">
          <thead><tr><th>날짜</th><th>구분</th><th>내용</th><th>상태</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <button class="btn" style="width:100%;margin-top:8px" onclick="addManualAction('${month}')">+ 수동 액션 추가</button>
    </div>
  `;

  el.innerHTML = html;
  renderActionLog(month);
}

function setStrategy(month, sid, state, name) {
  keyinData[month].strategyStates[sid] = state;
  const action = state==='applied'?'AI제안 적용':'AI제안 반려';
  addActionEntry(month, action, `[${name}] ${state==='applied'?'적용 결정':'반려 처리'}`, state==='applied'?'적용':'반려');
  renderTab5(month);
}

function modifyStrategy(month, sid, name) {
  const note = prompt(`[${name}] 수정 사항을 입력하세요:`);
  if (note) {
    keyinData[month].strategyStates[sid] = 'modified';
    addActionEntry(month, 'AI제안 수정', `[${name}] ${note}`, '적용(수정)');
    renderTab5(month);
  }
}

function addActionEntry(month, type, content, status) {
  if (!keyinData[month].actions) keyinData[month].actions = [];
  keyinData[month].actions.unshift({
    date: new Date().toISOString().slice(0,16).replace('T',' '),
    type, content, status
  });
  renderActionLog(month);
}

function addManualAction(month) {
  const content = prompt('액션 내용을 입력하세요:');
  if (content) {
    addActionEntry(month, '수동입력', content, '적용');
  }
}

function renderActionLog(month) {
  const tbody = document.querySelector(`#logTable-${month} tbody`);
  if (!tbody) return;
  const actions = keyinData[month].actions || [];
  if (actions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--ink-faint);padding:20px">아직 기록된 액션이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = actions.map(a => {
    const statusCls = a.status==='적용'||a.status==='적용(수정)'?'text-positive':a.status==='반려'?'text-negative':'text-warning';
    return `<tr>
      <td style="font-family:var(--mono);color:var(--ink-faint);font-size:11px">${a.date}</td>
      <td style="color:var(--gold);font-weight:600">${a.type}</td>
      <td style="color:var(--ink-soft)">${a.content}</td>
      <td class="${statusCls}" style="font-weight:600">${a.status}</td>
    </tr>`;
  }).join('');
}

// ============================================================
//  TAB NAVIGATION
// ============================================================
function setupNavigation() {
  // Month tabs
  document.getElementById('monthTabs').addEventListener('click', e => {
    const tab = e.target.closest('.month-tab');
    if (!tab) return;
    const month = tab.dataset.month;
    activeMonth = month;
    document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.month-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`mp-${month}`).classList.add('active');
    // Re-render charts for this month if needed
    renderTab3(month);
  });

  // Cycle tabs (event delegation)
  document.addEventListener('click', e => {
    const tab = e.target.closest('.cycle-tab');
    if (!tab) return;
    const cycle = parseInt(tab.dataset.cycle);
    const month = tab.dataset.month;
    activeCycle[month] = cycle;
    const panel = document.getElementById(`mp-${month}`);
    panel.querySelectorAll('.cycle-tab').forEach(t=>t.classList.remove('active'));
    panel.querySelectorAll('.cycle-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`cp-${month}-${cycle}`).classList.add('active');
    // Render charts on first visit
    if (cycle === 2) renderTab3(month);
  });

  // Pill toggles (event delegation)
  document.addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    const view = pill.dataset.view;
    const month = pill.dataset.month;
    activePill[month] = view;
    const container = pill.closest('.cycle-panel');
    container.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    container.querySelectorAll('.pill-panel').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    container.querySelector(`#pill-${view}-${month}`).classList.add('active');
  });
}

// ============================================================
//  INITIALIZATION
// ============================================================
async function init() {
  loadData();
  buildPage();
  setupNavigation();

  // Render all months
  MONTHS.forEach(month => {
    renderTab1(month);
    renderTab2(month);
    renderTab4(month);
    renderTab5(month);
  });

  // Render charts for active month
  renderTab3(activeMonth);

  // Auto-save every 30s
  setInterval(() => {
    localStorage.setItem('gs_strategy_keyin_v2', JSON.stringify(keyinData));
    document.getElementById('lastSaved').textContent = '자동저장: '+new Date().toLocaleTimeString('ko-KR');
  }, 30000);

  // Try to load real data
  try {
    const resp = await fetch('../data/rm_fcst_trend.json');
    if (resp.ok) {
      const data = await resp.json();
      console.log('rm_fcst_trend loaded, snapshots:', data.snapshots?.length);
    }
  } catch(e) { console.log('Using fallback data'); }

  try {
    const resp = await fetch('data/deep_analysis_v2.json');
    if (resp.ok) {
      const data = await resp.json();
      console.log('deep_analysis_v2 loaded');
    }
  } catch(e) { console.log('Using embedded deep analysis data'); }

  try {
    const resp = await fetch('data/deep_analysis_v3.json');
    if (resp.ok) {
      const data = await resp.json();
      console.log('deep_analysis_v3 loaded');
    }
  } catch(e) { console.log('Using embedded deep analysis v3 data'); }
}

document.readyState === 'loading'
  ? document.addEventListener('DOMContentLoaded', init)
  : init();
