<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS 채널 Action Plan 대시보드</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --card: #334155;
  --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
  --inbound: #06b6d4; --ota: #8b5cf6; --gota: #f59e0b;
  --green: #22c55e; --red: #ef4444; --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
.header { text-align: center; margin-bottom: 24px; }
.header h1 { font-size: 1.6rem; font-weight: 700; }
.header .date { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
.controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.controls select, .controls input { background: var(--surface); color: var(--text); border: 1px solid var(--card); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(--surface); border-radius: var(--radius); padding: 16px; text-align: center; }
.kpi .value { font-size: 2rem; font-weight: 800; }
.kpi .label { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
.kpi.inbound .value { color: var(--inbound); }
.kpi.ota .value { color: var(--ota); }
.kpi.gota .value { color: var(--gota); }
.section { margin-bottom: 24px; }
.section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; padding-left: 12px; border-left: 3px solid var(--accent); }
.chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }
.chart-box { background: var(--surface); border-radius: var(--radius); padding: 16px; }
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
.bar-row .label { width: 70px; text-align: right; color: var(--muted); flex-shrink: 0; }
.bar-row .bar { height: 22px; border-radius: 4px; transition: width 0.5s; min-width: 2px; display: flex; align-items: center; padding-left: 6px; font-size: 0.75rem; font-weight: 600; }
.bar-row .count { width: 30px; text-align: right; flex-shrink: 0; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
table th { background: var(--card); padding: 8px 10px; text-align: left; font-weight: 600; position: sticky; top: 0; }
table td { padding: 7px 10px; border-bottom: 1px solid var(--card); }
table tr:hover td { background: rgba(59,130,246,0.1); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.badge.inbound { background: rgba(6,182,212,0.2); color: var(--inbound); }
.badge.ota { background: rgba(139,92,246,0.2); color: var(--ota); }
.badge.gota { background: rgba(245,158,11,0.2); color: var(--gota); }
.table-wrap { max-height: 500px; overflow-y: auto; background: var(--surface); border-radius: var(--radius); }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-header { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 4px; }
.cal-day { background: var(--surface); border-radius: 6px; padding: 6px; min-height: 60px; font-size: 0.7rem; }
.cal-day .day-num { font-weight: 700; margin-bottom: 4px; }
.cal-day .promo-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin: 1px; }
.empty { visibility: hidden; }

/* Red Alert Styles */
.red-alert-section { margin-bottom: 24px; }
.red-alert-section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; padding-left: 12px; border-left: 3px solid var(--red); color: var(--red); }
.alert-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
.alert-kpi { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 12px; text-align: center; }
.alert-kpi .value { font-size: 1.6rem; font-weight: 800; color: var(--red); }
.alert-kpi .label { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
.alert-kpi.warn { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
.alert-kpi.warn .value { color: var(--gota); }
.alert-month-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.alert-month-tab { background: var(--surface); color: var(--muted); border: 1px solid var(--card); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
.alert-month-tab.active { background: var(--red); color: #fff; border-color: var(--red); }
.alert-card { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--red); }
.alert-card.warning { border-left-color: var(--gota); }
.alert-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.alert-card-header .name { font-weight: 700; font-size: 0.95rem; }
.severity-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
.severity-badge.critical { background: rgba(239,68,68,0.2); color: var(--red); }
.severity-badge.warning { background: rgba(245,158,11,0.2); color: var(--gota); }
.alert-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 8px; }
.alert-metric { background: var(--card); border-radius: 8px; padding: 8px; text-align: center; }
.alert-metric .val { font-size: 1rem; font-weight: 700; }
.alert-metric .val.bad { color: var(--red); }
.alert-metric .val.ok { color: var(--green); }
.alert-metric .lbl { font-size: 0.65rem; color: var(--muted); }
.alert-promos summary { font-size: 0.8rem; color: var(--accent); cursor: pointer; font-weight: 600; margin-top: 8px; }
.alert-promo-list { margin-top: 6px; font-size: 0.75rem; }
.alert-promo-item { background: var(--card); border-radius: 6px; padding: 6px 10px; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
.alert-promo-item .ch-badge { flex-shrink: 0; }
.alert-no-promo { background: rgba(239,68,68,0.1); border: 1px dashed var(--red); border-radius: 8px; padding: 8px 12px; font-size: 0.8rem; color: var(--red); margin-top: 8px; }
.alert-flags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.alert-flag { font-size: 0.65rem; padding: 1px 6px; border-radius: 4px; background: rgba(239,68,68,0.15); color: var(--red); }
</style>
</head>

<div class="header">
  <h1>GS 채널 Action Plan 대시보드</h1>
  <div class="date" id="reportDate"></div>
</div>

<div class="controls">
  <label>기준일: <input type="date" id="dateInput" value="2026-04-28"></label>

  <label>사업장: <select id="siteFilter"><option value="all">전체</option></select></label>

    <option value="Inbound">Inbound</option>
    <option value="OTA">OTA</option>

</div>

<div class="kpi-row" id="kpiRow"></div>

<div class="red-alert-section" id="redAlertSection">
  <h2>긴급 대응 필요 사업장</h2>

  <div class="alert-month-tabs" id="alertMonthTabs"></div>
  <div id="alertCards"></div>
</div>



<div class="section">
  <h2>채널/사업장 분포</h2>
  <div class="chart-container">
    <div class="chart-box"><h3 style="font-size:0.9rem;margin-bottom:10px;">GS채널별</h3><div id="gsChart" class="bar-chart"></div></div>
    <div class="chart-box"><h3 style="font-size:0.9rem;margin-bottom:10px;">사업장별</h3><div id="siteChart" class="bar-chart"></div></div>
  </div>
</div>

<div class="section">
  <h2>진행중 기획전 목록</h2>
  <div class="table-wrap">
    <table>

    </table>
  </div>
</div>

<div class="section">
  <h2>월별 기획전 추이</h2>
  <div class="chart-box"><div id="monthlyChart" class="bar-chart"></div></div>
</div>

function getActive(records, dateStr) {
  return records.filter(r => {
    const s = r.sale_period?.start;
    const e = r.sale_period?.end;
    return s && e && s <= dateStr && dateStr <= e;
  });
}

function countBy(arr, key) {
  const m = {};
  arr.forEach(r => { const k = r[key] || '미분류'; m[k] = (m[k]||0)+1; });
  return Object.entries(m).sort((a,b) => b[1]-a[1]);
}

function renderBar(container, data, colorFn) {
  const max = Math.max(...data.map(d=>d[1]), 1);
  container.innerHTML = data.map(([label, count]) => `
    <div class="bar-row">
      <span class="label">${label}</span>
      <div class="bar" style="width:${Math.max(count/max*100,3)}%;background:${colorFn(label)}">${count}</div>
    </div>
  `).join('');
}

function gsColor(ch) {
  if(ch==='Inbound') return 'var(--inbound)';
  if(ch==='OTA') return 'var(--ota)';
  return 'var(--gota)';
}

function siteColor() { return 'var(--accent)'; }

  `).join('');

  });
  const monthData = Object.entries(monthly).sort();
  renderBar(document.getElementById('monthlyChart'), monthData, ()=>'var(--accent)');
}

const RED_SUMMARY = {"total_alerts": 77, "critical": 36, "warning": 41, "no_promotion_count": 4};
const RED_THRESHOLDS = {"2026-04": 90.0, "2026-05": 70.0, "2026-06": 30.0, "2026-07": 10.0};

function renderRedAlerts() {
  const summaryEl = document.getElementById('alertSummary');
  summaryEl.innerHTML = `
    <div class="alert-kpi"><div class="value">${RED_SUMMARY.total_alerts}</div><div class="label">전체 빨간불</div></div>
    <div class="alert-kpi"><div class="value">${RED_SUMMARY.critical}</div><div class="label">CRITICAL</div></div>
    <div class="alert-kpi warn"><div class="value">${RED_SUMMARY.warning}</div><div class="label">WARNING</div></div>
    <div class="alert-kpi"><div class="value">${RED_SUMMARY.no_promotion_count}</div><div class="label">기획전 미매칭</div></div>
  `;
  const months = [...new Set(RED_ALERTS.map(a => a.month))];
  const tabsEl = document.getElementById('alertMonthTabs');
  tabsEl.innerHTML = months.map((m, i) => {
    const cnt = RED_ALERTS.filter(a => a.month === m).length;
    const thr = RED_THRESHOLDS[m] || '?';
    return `<div class="alert-month-tab ${i===0?'active':''}" data-month="${m}" onclick="selectAlertMonth('${m}',this)">${m} (${cnt}건, 기준${thr}%)</div>`;
  }).join('');
  if (months.length > 0) renderAlertCards(months[0]);
}

function selectAlertMonth(month, el) {
  document.querySelectorAll('.alert-month-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAlertCards(month);
}

function renderAlertCards(month) {
  const alerts = RED_ALERTS.filter(a => a.month === month)
    .sort((a,b) => (a.severity === 'critical' ? 0 : 1) - (b.severity === 'critical' ? 0 : 1) || a.budget_achievement - b.budget_achievement);
  const cardsEl = document.getElementById('alertCards');
  cardsEl.innerHTML = alerts.map(a => {
    const achClass = a.budget_achievement < a.threshold ? 'bad' : 'ok';
    const yoyClass = a.yoy_pct < -5 ? 'bad' : 'ok';
    const occClass = a.occ_yoy_change < -5 ? 'bad' : 'ok';
    let promoHtml = '';
    if (a.matched_promotions && a.matched_promotions.length > 0) {
      const promoItems = a.matched_promotions.slice(0, 5).map(p => `
        <div class="alert-promo-item">
          <span class="ch-badge badge ${(p.gs_channel||'').toLowerCase().replace('-','')}">${p.gs_channel}</span>
          <span>${p.channel} - ${(p.product||'').substring(0,50)}</span>
        </div>
      `).join('');
      const moreText = a.matched_promotions.length > 5 ? `<div style="color:var(--muted);font-size:0.7rem;margin-top:4px;">외 ${a.matched_promotions.length - 5}건 더...</div>` : '';
      promoHtml = `<details class="alert-promos"><summary>진행중 기획전 ${a.matched_promotions.length}건</summary><div class="alert-promo-list">${promoItems}${moreText}</div></details>`;
    } else {
      promoHtml = `<div class="alert-no-promo">진행중 기획전 없음 - 긴급 기획 필요</div>`;
    }
    const flagBadges = Object.entries(a.flags || {}).map(([k,v]) => `<span class="alert-flag">${v}</span>`).join('');
    return `
      <div class="alert-card ${a.severity}">
        <div class="alert-card-header">
          <span class="name">${a.property}</span>
          <span class="severity-badge ${a.severity}">${a.severity.toUpperCase()}</span>
        </div>
        <div class="alert-metrics">
          <div class="alert-metric"><div class="val ${achClass}">${a.budget_achievement}%</div><div class="lbl">달성률 (기준 ${a.threshold}%)</div></div>
          <div class="alert-metric"><div class="val ${yoyClass}">${a.yoy_pct > 0 ? '+' : ''}${a.yoy_pct}%</div><div class="lbl">YoY</div></div>
          <div class="alert-metric"><div class="val ${occClass}">${a.occ_yoy_change > 0 ? '+' : ''}${a.occ_yoy_change}%p</div><div class="lbl">OCC 변동</div></div>
          <div class="alert-metric"><div class="val">${a.vs_budget.toLocaleString()}</div><div class="lbl">vs Budget (RNs)</div></div>
        </div>
        <div class="alert-flags">${flagBadges}</div>
        ${promoHtml}
      </div>`;
  }).join('');
}
renderRedAlerts();
