name: 🚀 Auto Build & Deploy

on:
  # 1. 매일 한국시간 08:00 자동 실행 (UTC 23:00) + 매 4시간마다 뉴스 자동 갱신
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 */4 * * *'
  
  # 3. data/ 또는 scripts/ 변경 시 자동 실행 (수기 입력 즉시 반영)
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/index.html'
      - 'scripts/**'
      - '.github/workflows/**'
  
  # 4. 수동 실행
  workflow_dispatch:
    inputs:
      skip_news:
        description: '뉴스 수집 건너뛰기'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📚 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 📰 [Step 1] 뉴스 수집 (Google News RSS)
        continue-on-error: true
        run: |
          echo "::group::뉴스 수집"
          python scripts/collect_news.py
          echo "::endgroup::"
      
      - name: 🎯 [Step 1.5] GS Monitor 경쟁사 자동 수집
        continue-on-error: true
        run: |
          echo "::group::경쟁사 동향 수집"
          python scripts/collect_gs_monitor.py || echo "⚠ GS Monitor 수집 실패 - 기존 데이터 유지"
          echo "::endgroup::"
      
      - name: 📊 [Step 2] Power BI 데이터 수집 (optional)
        continue-on-error: true
        run: |
          echo "::group::Power BI 수집"
          python scripts/collect_powerbi.py || echo "⚠ Power BI 수집 실패 (환경변수 없음) - 스킵"
          echo "::endgroup::"
      
      - name: 🤖 [Step 3] 인사이트 자동 생성 (KPI → 오늘의 한 줄 + 액션)
        run: |
          echo "::group::인사이트 생성"
          python scripts/generate_insights.py
          echo "::endgroup::"
      
      - name: 🔨 [Step 4] HTML 빌드 (모든 데이터 주입)
        run: |
          echo "::group::HTML 빌드"
          python scripts/build.py
          echo "::endgroup::"
      
      - name: 💾 [Step 5] 결과 자동 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GS Auto-Bot"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "ℹ 변경사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(auto): daily update $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST [skip ci]"
            git push || echo "⚠ 푸시 실패 (동시 실행 충돌 가능)"
          fi
      
      - name: 📄 Setup GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: ✅ Summary
        run: |
          echo "## 🎉 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **배포 시각**: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M:%S') KST" >> $GITHUB_STEP_SUMMARY
          echo "- **배포 URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
