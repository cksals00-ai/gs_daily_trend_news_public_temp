name: 🚀 Auto Build & Deploy

on:
  # 매일 한국시간 08:00 (UTC 23:00) + 매 4시간마다 뉴스 자동 갱신
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 */4 * * *'

  # data/ · scripts/ · docs/ · workflow 변경 시 자동 실행
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/**'

  # 수동 실행
  workflow_dispatch:
    inputs:
      skip_news:
        description: '뉴스 수집 건너뛰기'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

# 트리거별로 concurrency 분리 — push/schedule/dispatch가 서로 취소하지 않도록
concurrency:
  group: "pages-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # fetch-depth: 2 — HEAD + HEAD~1만 받아서 변경 파일 감지 (전체 히스토리 불필요)
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      # push 이벤트에서 docs/만 변경됐으면 Python 스킵 → 배포만 수행
      - name: 🔍 Detect build mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
            NON_DOCS=$(echo "$CHANGED" | grep -cvE '^docs/' || true)
            if [[ "$NON_DOCS" == "0" ]]; then
              echo "full=false" >> $GITHUB_OUTPUT
              echo "⚡ deploy-only mode (docs/ 변경만 감지 — Python 스킵)"
            else
              echo "full=true" >> $GITHUB_OUTPUT
              echo "🔨 full-build mode"
            fi
          else
            echo "full=true" >> $GITHUB_OUTPUT
            echo "🔨 full-build mode (schedule/dispatch)"
          fi

      - name: 🐍 Setup Python 3.11
        if: steps.mode.outputs.full == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # pip 캐시 — requests는 거의 안 바뀌므로 매번 다운로드 불필요
      - name: 💾 Cache pip
        if: steps.mode.outputs.full == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-requests-v1
          restore-keys: ${{ runner.os }}-pip-

      - name: 📚 Install dependencies
        if: steps.mode.outputs.full == 'true'
        run: python -m pip install --upgrade pip && pip install requests

      - name: 📰 [Step 1] 뉴스 수집 (Google News RSS)
        if: steps.mode.outputs.full == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "::group::뉴스 수집"
          python scripts/collect_news.py
          echo "::endgroup::"

      - name: 🎯 [Step 1.5] GS Monitor 경쟁사 자동 수집
        if: steps.mode.outputs.full == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "::group::경쟁사 동향 수집"
          python scripts/collect_gs_monitor.py || echo "⚠ GS Monitor 수집 실패 - 기존 데이터 유지"
          echo "::endgroup::"

      - name: 📊 [Step 2] Power BI 데이터 수집 (optional)
        if: steps.mode.outputs.full == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "::group::Power BI 수집"
          python scripts/collect_powerbi.py || echo "⚠ Power BI 수집 실패 (환경변수 없음) - 스킵"
          echo "::endgroup::"

      - name: 🤖 [Step 3] 인사이트 자동 생성 (KPI → 오늘의 한 줄 + 액션)
        if: steps.mode.outputs.full == 'true'
        timeout-minutes: 5
        run: |
          echo "::group::인사이트 생성"
          python scripts/generate_insights.py
          echo "::endgroup::"

      - name: 📊 [Step 3.5] 사업장별 투숙일 데이터 생성
        if: steps.mode.outputs.full == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "::group::사업장별 SDD 생성"
          python scripts/gen_sdd_by_prop.py || echo "⚠ SDD by prop 생성 실패 - 기존 데이터 유지"
          echo "::endgroup::"

      - name: 🔨 [Step 4] HTML 빌드 (모든 데이터 주입)
        if: steps.mode.outputs.full == 'true'
        timeout-minutes: 10
        run: |
          echo "::group::HTML 빌드"
          python scripts/build.py
          echo "::endgroup::"

      - name: 💾 [Step 5] 결과 자동 커밋
        if: steps.mode.outputs.full == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GS Auto-Bot"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "ℹ 변경사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(auto): daily update $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST [skip ci]"
            git push || echo "⚠ 푸시 실패 (동시 실행 충돌 가능)"
          fi

      - name: 📄 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Summary
        run: |
          MODE="${{ steps.mode.outputs.full == 'true' && 'full-build' || 'deploy-only' }}"
          echo "## 🎉 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **배포 시각**: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M:%S') KST" >> $GITHUB_STEP_SUMMARY
          echo "- **배포 URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **빌드 모드**: $MODE" >> $GITHUB_STEP_SUMMARY
